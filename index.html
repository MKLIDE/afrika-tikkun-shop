        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        /* ===== 2050 CORE STYLES ===== */
        :root {
            --primary-red: #C41E3A;
            --primary-glow: rgba(196, 30, 58, 0.5);
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.5);
            --cyber-blue: #00f3ff;

        /* Ultra-smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Futuristic glass with liquid animation */
        .quantum-glass {
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Holographic cards */
        .holo-card {
            background: linear-gradient(145deg, rgba(30, 30, 40, 0.9), rgba(20, 20, 30, 0.95));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(196, 30, 58, 0.2);
            border-radius: 24px;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .holo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.7s ease;
        }

        .holo-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--primary-red);
            box-shadow: 
                0 20px 40px -15px var(--primary-glow),
                0 0 30px var(--primary-glow);
        }

        .holo-card:hover::before {
            left: 100%;
        }

        /* 2050 Button with magnetic effect */
        .btn-2050 {
            background: linear-gradient(135deg, var(--primary-red), #ff4d6d);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        .btn-2050::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-2050:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 
                0 15px 30px -10px var(--primary-glow),
                0 0 30px var(--primary-glow);
            border-color: white;
        }

        .btn-2050:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-2050:active {
            transform: scale(0.98);
        }

        /* Smooth quantum ripple effect */
        .quantum-ripple {
            position: relative;
            overflow: hidden;
        }

        .quantum-ripple::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }

        .quantum-ripple:active::after {
            width: 300px;
            height: 300px;
            opacity: 0;
        }

        /* Holographic product image */
        .holo-image {
            position: relative;
            overflow: hidden;
            border-radius: 20px 20px 0 0;
            height: 280px;
        }

        .holo-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .holo-card:hover .holo-image img {
            transform: scale(1.15);
        }

        .holo-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            opacity: 1;
        }

            left: 0;
            right: 0;

        }

        }

        /* Floating animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }

        }

        .float {
            animation: float 6s ease-in-out infinite;
        }

        /* Quantum slider */
        .quantum-slider {
            position: relative;

            border-radius: 32px;
            height: 500px;
            border: 1px solid rgba(196, 30, 58, 0.3);
            box-shadow: 0 30px 60px -20px black;
        }

        .slider-track {
            display: flex;
            width: 400%;
            height: 100%;
            animation: quantumSlide 25s infinite cubic-bezier(0.45, 0.05, 0.2, 0.99);
        }

        .slider-track:hover {
            animation-play-state: paused;
        }

        @keyframes quantumSlide {
            0%, 15% { transform: translateX(0); }
            20%, 35% { transform: translateX(-25%); }
            40%, 55% { transform: translateX(-50%); }
            60%, 75% { transform: translateX(-75%); }
            80%, 100% { transform: translateX(0); }
        }

        /* 2050 scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a24;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--primary-red), #ff4d6d);
            border-radius: 5px;
            transition: all 0.3s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #ff4d6d, var(--primary-red));
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* Quantum price tag */
        .price-quantum {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }

        /* Magnetic quantity selector */
        .quantum-quantity {
            display: inline-flex;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .quantum-quantity button {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2rem;
        }

        .quantum-quantity button:hover {
            background: var(--primary-red);
            transform: scale(1.1);
        }

        .quantum-quantity input {
            width: 60px;
            text-align: center;
            background: transparent;
            border: none;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* Loading spinner 2050 */
        .quantum-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(196, 30, 58, 0.1);
            border-top-color: var(--primary-red);
            border-right-color: var(--gold);
            border-radius: 50%;
            animation: quantumSpin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        @keyframes quantumSpin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* 2050 header */
        .quantum-header {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(196, 30, 58, 0.2);
            transition: all 0.3s;
        }

        .quantum-header.scrolled {
            background: rgba(10, 10, 15, 0.95);
            box-shadow: 0 10px 30px -10px black;
        }

        /* Particle background */
        .particle-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, rgba(196, 30, 58, 0.1) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.1) 0%, transparent 30%),
                        #0a0a0f;
        }
    </style>

                    try {
                        return JSON.parse(localStorage.getItem('cart')) || [];
                    } catch {
                        return [];
                    }
                });

                React.useEffect(() => {
                    localStorage.setItem('cart', JSON.stringify(items));
                }, [items]);

                const addToCart = (product, quantity = 1) => {
                    setItems(prev => {
                        const existing = prev.find(item => item.id === product.id);
                        if (existing) {
                            return prev.map(item => 
                                item.id === product.id 
                                    ? { ...item, quantity: item.quantity + quantity }
                                    : item
                            );
                        }
                        return [...prev, { ...product, quantity }];
                    });
                };

                const removeFromCart = (id) => {
                    setItems(prev => prev.filter(item => item.id !== id));
                };

                const updateQuantity = (id, quantity) => {
                    if (quantity <= 0) {
                        removeFromCart(id);
                        return;
                    }
                    setItems(prev => prev.map(item => 
                        item.id === id ? { ...item, quantity } : item
                    ));
                };

                const getTotal = () => items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
