    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #faf7f2;
            color: #2c2c2c;
        }

        /* Original Afrika Tikkun Colors */
        :root {
            --primary-red: #C41E3A;
            --primary-red-light: #d8455e;
            --primary-red-dark: #9e182f;
            --gold: #D4AF37;
            --gold-light: #e5c564;
            --gold-dark: #b8960c;
            --cream: #fdf6e9;
            --charcoal: #2c2c2c;
            --off-white: #faf7f2;
        }

        /* ===== SMOOTH 2050 ADDITIONS ===== */
        html {
            scroll-behavior: smooth;
        }

        /* Ultra-smooth transitions */
        .heritage-card, .btn-primary, .btn-gold, .btn-outline, .heritage-chip, a {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Magnetic button effect */
        .btn-primary:hover, .btn-gold:hover, .btn-outline:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 20px 30px -10px var(--primary-red);
        }

        .btn-primary:active, .btn-gold:active, .btn-outline:active {
            transform: scale(0.98);
        }

        /* Ripple effect on click */
        .btn-primary, .btn-gold, .btn-outline {
            position: relative;
            overflow: hidden;
        }

        .btn-primary::after, .btn-gold::after, .btn-outline::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s, opacity 0.6s;
            opacity: 0;
            pointer-events: none;
        }

        .btn-primary:active::after, .btn-gold:active::after, .btn-outline:active::after {
            width: 300px;
            height: 300px;
            opacity: 1;
        }

        /* Smooth card hover */
        .heritage-card {
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: white;
            border: 1px solid rgba(196, 30, 58, 0.15);
            border-radius: 24px;
            box-shadow: 0 10px 30px -10px rgba(196, 30, 58, 0.2);
            position: relative;
            overflow: hidden;
        }

        .heritage-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--primary-red);
            box-shadow: 0 20px 40px -15px rgba(196, 30, 58, 0.3);
        }

        .heritage-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-red), var(--gold), var(--primary-red));
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .heritage-card:hover::before {
            transform: translateX(0);
        }

        /* Smooth image zoom */
        .product-image {
            position: relative;
            overflow: hidden;
            border-radius: 20px 20px 0 0;
            height: 280px;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .heritage-card:hover .product-image img {
            transform: scale(1.1);
        }

        /* Smooth category chips */
        .heritage-chip {
            background: white;
            border: 1px solid rgba(196, 30, 58, 0.2);
            color: var(--charcoal);
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .heritage-chip:hover {
            transform: scale(1.1) translateY(-2px);
            background: var(--primary-red);
            border-color: var(--primary-red);
            color: white;
            box-shadow: 0 5px 15px rgba(196, 30, 58, 0.3);
        }

        .heritage-chip.active {
            background: var(--primary-red);
            border-color: var(--primary-red);
            color: white;
        }

        /* Smooth quick view */
        .quick-view {
            position: absolute;
            bottom: -60px;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-top: 1px solid var(--primary-red);
            transition: bottom 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .heritage-card:hover .quick-view {
            bottom: 0;
        }

        /* Smooth quantity buttons */
        .heritage-quantity {
            display: inline-flex;
            border: 1px solid rgba(196, 30, 58, 0.2);
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }

        .heritage-quantity button {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: none;
            color: var(--charcoal);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .heritage-quantity button:hover {
            background: var(--primary-red);
            color: white;
            transform: scale(1.1);
        }

        .heritage-quantity input {
            width: 60px;
            text-align: center;
            background: white;
            border: none;
            border-left: 1px solid rgba(196, 30, 58, 0.1);
            border-right: 1px solid rgba(196, 30, 58, 0.1);
            color: var(--charcoal);
            font-weight: 600;
        }

        /* Smooth slider */
        .slider-container {
            position: relative;
            overflow: hidden;
            border-radius: 32px;
            height: 500px;
            border: 1px solid rgba(196, 30, 58, 0.2);
            margin-bottom: 3rem;
        }

        .slider-track {
            display: flex;
            width: 400%;
            height: 100%;
            animation: smoothSlide 25s infinite cubic-bezier(0.45, 0.05, 0.2, 0.99);
        }

        .slider-track:hover {
            animation-play-state: paused;
        }

        @keyframes smoothSlide {
            0%, 20% { transform: translateX(0); }
            25%, 45% { transform: translateX(-25%); }
            50%, 70% { transform: translateX(-50%); }
            75%, 95% { transform: translateX(-75%); }
            100% { transform: translateX(0); }
        }

        .slide {
            width: 25%;
            height: 100%;
            position: relative;
        }

        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, rgba(196, 30, 58, 0.1), rgba(212, 175, 55, 0.1));
            z-index: 1;
        }

        .slide-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            width: 80%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 30px;
            border: 1px solid rgba(196, 30, 58, 0.2);
            backdrop-filter: blur(10px);
        }

        /* Floating animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .float {
            animation: float 4s ease-in-out infinite;
        }

        /* Buttons */
        .btn-primary {
            background: var(--primary-red);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: 1px solid var(--primary-red);
            cursor: pointer;
            text-decoration: none;
        }

        .btn-primary:hover {
            background: var(--primary-red-dark);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary-red);
            color: var(--primary-red);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .btn-outline:hover {
            background: var(--primary-red);
            color: white;
        }

        /* Cart badge */
        .heritage-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--primary-red);
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Price tag */
        .price-heritage {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-red);
        }

        /* Loading spinner */
        .heritage-spinner {
            border: 3px solid rgba(196, 30, 58, 0.1);
            border-top-color: var(--primary-red);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Heritage glass */
        .heritage-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(196, 30, 58, 0.1);
            box-shadow: 0 8px 32px rgba(196, 30, 58, 0.08);
        }

        /* Heritage background */
        .heritage-bg {
            background: var(--off-white);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(196, 30, 58, 0.03) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.03) 0%, transparent 30%),
                repeating-linear-gradient(45deg, rgba(196, 30, 58, 0.01) 0px, rgba(196, 30, 58, 0.01) 1px, transparent 1px, transparent 10px);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--cream);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-red);
            border-radius: 5px;
            transition: all 0.3s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-red-dark);
        }

        /* Utility classes */
        .text-primary-red {
            color: var(--primary-red);
        }

        .bg-primary-red {
            background: var(--primary-red);
        }

        .border-primary-red {
            border-color: var(--primary-red);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
        }
    </style>
</head>

            // ==================== CONTEXT ====================
            const AuthContext = React.createContext(null);
            const CartContext = React.createContext(null);

            // ==================== AUTH PROVIDER ====================
            const AuthProvider = ({ children }) => {
                const [user, setUser] = React.useState(() => {
                    try {
                        const saved = localStorage.getItem('user');
                        return saved ? JSON.parse(saved) : null;
                    } catch {
                        return null;
                    }
                });

                const login = async (email, password) => {
                    if (email === 'nomathemba@gmail.com' && password === 'Thembi') {
                        const userData = { 
                            id: 1, 
                            email: 'nomathemba@gmail.com',
                            firstName: 'Nomathemba',
                            lastName: 'Thembi',
                            roles: ['ROLE_ADMIN'],
                            lastLogin: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                        };
                        setUser(userData);
                        localStorage.setItem('user', JSON.stringify(userData));
                        return { success: true };
                    }
                    return { success: false, error: 'This demo is exclusively for Nomathemba' };
                };

                const logout = () => {
                    setUser(null);
                    localStorage.removeItem('user');
                    window.location.hash = '#/login';
                };

                const isAdmin = () => user?.roles?.includes('ROLE_ADMIN') || false;

                return React.createElement(
                    AuthContext.Provider,
                    { value: { user, login, logout, isAdmin } },
                    children
                );
            };

            // ==================== CART PROVIDER ====================
            const CartProvider = ({ children }) => {
                const [items, setItems] = React.useState(() => {
                    try {
                        const saved = localStorage.getItem('cart');
                        return saved ? JSON.parse(saved) : [];
                    } catch {
                        return [];
                    }
                });

                React.useEffect(() => {
                    localStorage.setItem('cart', JSON.stringify(items));
                }, [items]);

                const addToCart = (product, quantity = 1) => {
                    setItems(prev => {
                        const existing = prev.find(item => item.id === product.id);
                        if (existing) {
                            return prev.map(item => 
                                item.id === product.id 
                                    ? { ...item, quantity: item.quantity + quantity }
                                    : item
                            );
                        }
                        return [...prev, { ...product, quantity }];
                    });
                };

                const removeFromCart = (id) => {
                    setItems(prev => prev.filter(item => item.id !== id));
                };

                const updateQuantity = (id, quantity) => {
                    if (quantity <= 0) {
                        removeFromCart(id);
                        return;
                    }
                    setItems(prev => prev.map(item => 
                        item.id === id ? { ...item, quantity } : item
                    ));
                };

                const getTotal = () => items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const getCount = () => items.reduce((sum, item) => sum + item.quantity, 0);

                return React.createElement(
                    CartContext.Provider,
                    { value: { items, addToCart, removeFromCart, updateQuantity, getTotal, getCount } },
                    children
                );

                    { className: 'container mx-auto px-4 py-8' },
                    React.createElement(
                        'div',
                        { className: 'bg-white rounded-2xl p-8 text-center mb-8 border border-primary-red/20' },
                        React.createElement('h1', { className: 'text-3xl font-bold mb-2' }, 'Welcome, Nomathemba!'),
                        React.createElement('p', { className: 'text-gray-600' }, `Signed in at ${user.lastLogin}`)
                    ),
                    React.createElement(
                        'div',
                        { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6' },
                        products.slice(0, 3).map(p => React.createElement(
                            'div',
                            { key: p.id, className: 'bg-white rounded-xl p-4 border border-gray-200' },
                            React.createElement('img', { src: p.image, className: 'w-full h-48 object-cover rounded-lg mb-4' }),
                            React.createElement('h3', { className: 'font-bold' }, p.name),
                            React.createElement('p', { className: 'text-primary-red font-bold mt-2' }, `R${p.price}`)
                        ))
                    )
                );
            };

            // ==================== MAIN APP ====================
            const App = () => {
                const [currentPath, setCurrentPath] = React.useState(window.location.hash || '#/');

                React.useEffect(() => {
                    const handleHashChange = () => {
                        setCurrentPath(window.location.hash || '#/');
                    };
                    window.addEventListener('hashchange', handleHashChange);
                    if (!window.location.hash) {
                        window.location.hash = '#/login';
                    }
                    return () => window.removeEventListener('hashchange', handleHashChange);
                }, []);

                const renderPage = () => {
                    const path = currentPath.split('?')[0];
                    
                    if (path === '#/login') return React.createElement(Login);
                    return React.createElement(Home);
                };

                return React.createElement(
                    AuthProvider,
                    null,
                    React.createElement(
                        CartProvider,
                        null,
                        React.createElement(
                            'div',
                            { className: 'heritage-bg' },
                            renderPage()
                        )
                    )
                );
            };

            // ==================== RENDER ====================
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(App));
        })();
    </script>
</body>
</html>
