<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afrika Tikkun - Support the Mission</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 1rem; }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.75rem 1.5rem; font-weight: 600; border-radius: 0.5rem; transition: all 0.2s; cursor: pointer; text-decoration: none; }
        .btn-primary { background: #C41E3A; color: white; }
        .btn-primary:hover { background: #A81830; }
        .text-primary { color: #C41E3A; }
        .bg-primary { background: #C41E3A; }
        .min-h-screen { min-height: 100vh; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .grid { display: grid; }
        .gap-4 { gap: 1rem; }
        .gap-8 { gap: 2rem; }
        .p-4 { padding: 1rem; }
        .p-6 { padding: 1.5rem; }
        .p-8 { padding: 2rem; }
        .m-4 { margin: 1rem; }
        .mt-8 { margin-top: 2rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-8 { margin-bottom: 2rem; }
        .text-center { text-align: center; }
        .text-2xl { font-size: 1.5rem; }
        .text-3xl { font-size: 1.875rem; }
        .text-4xl { font-size: 2.25rem; }
        .font-bold { font-weight: 700; }
        .bg-white { background: white; }
        .bg-gray-50 { background: #F9FAFB; }
        .bg-gray-900 { background: #111827; }
        .text-white { color: white; }
        .text-gray-600 { color: #4B5563; }
        .text-gray-400 { color: #9CA3AF; }
        .shadow-md { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .rounded-lg { border-radius: 0.5rem; }
        .rounded-xl { border-radius: 0.75rem; }
        .overflow-hidden { overflow: hidden; }
        .object-cover { object-fit: cover; }
        .w-full { width: 100%; }
        .h-64 { height: 16rem; }
        .h-20 { height: 5rem; }
        .sticky { position: sticky; }
        .top-0 { top: 0; }
        .z-50 { z-index: 50; }
        .border { border: 1px solid #e5e7eb; }
        .border-t { border-top: 1px solid #e5e7eb; }
        .border-b { border-bottom: 1px solid #e5e7eb; }
        .grid-cols-1 { grid-template-columns: repeat(1, 1fr); }
        .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
        @media (min-width: 768px) {
            .md\:grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
            .md\:grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 1024px) {
            .lg\:grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
            .lg\:grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
        }
        .fixed { position: fixed; }
        .bottom-4 { bottom: 1rem; }
        .right-4 { right: 1rem; }
        .w-12 { width: 3rem; }
        .h-12 { height: 3rem; }
        .rounded-full { border-radius: 9999px; }
        .cursor-pointer { cursor: pointer; }
        .hover\:scale-110:hover { transform: scale(1.1); }
        .transition-all { transition: all 0.3s; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        (function() {
            // ==================== MOCK DATA ====================
            const products = [
                { id: 1, name: 'Heritage Hoodie', price: 450, category: 'Hoodies', image: 'https://images.unsplash.com/photo-1556905055-8f358a7a47b2?w=400', description: 'Premium quality hoodie with embroidered logo' },
                { id: 2, name: 'Empowerment T-Shirt', price: 250, category: 'T-Shirts', image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400', description: 'Classic fit cotton t-shirt' },
                { id: 3, name: 'Water Bottle', price: 180, category: 'Bottles', image: 'https://images.unsplash.com/photo-1602143407151-7111542de6e8?w=400', description: 'Stainless steel vacuum bottle' },
                { id: 4, name: 'Coffee Mug', price: 120, category: 'Cups', image: 'https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?w=400', description: 'Ceramic mug with logo' },
                { id: 5, name: 'Drawstring Bag', price: 150, category: 'Bags', image: 'https://images.unsplash.com/photo-1622560480654-962b1f48a50d?w=400', description: 'Lightweight drawstring backpack' },
                { id: 6, name: 'Baseball Cap', price: 200, category: 'Caps', image: 'https://images.unsplash.com/photo-1588850567220-85db1e1c816f?w=400', description: 'Adjustable cotton cap' }
            ];

            // ==================== CONTEXT ====================
            const AuthContext = React.createContext(null);
            const CartContext = React.createContext(null);

            // ==================== AUTH PROVIDER ====================
            const AuthProvider = ({ children }) => {
                const [user, setUser] = React.useState(() => {
                    try {
                        return JSON.parse(localStorage.getItem('user')) || null;
                    } catch {
                        return null;
                    }
                });

                const login = async (email, password) => {
                    if (email === 'admin@afrikatikkun.org' && password === 'admin123') {
                        const userData = { id: 1, email, firstName: 'Admin', lastName: 'User', roles: ['ROLE_ADMIN'] };
                        setUser(userData);
                        localStorage.setItem('user', JSON.stringify(userData));
                        return true;
                    }
                    if (email && password) {
                        const userData = { id: 2, email, firstName: email.split('@')[0], lastName: 'User', roles: ['ROLE_USER'] };
                        setUser(userData);
                        localStorage.setItem('user', JSON.stringify(userData));
                        return true;
                    }
                    return false;
                };

                const logout = () => {
                    setUser(null);
                    localStorage.removeItem('user');
                };

                const isAdmin = () => user?.roles?.includes('ROLE_ADMIN') || false;

                return React.createElement(AuthContext.Provider, { value: { user, login, logout, isAdmin } }, children);
            };

            // ==================== CART PROVIDER ====================
            const CartProvider = ({ children }) => {
                const [items, setItems] = React.useState(() => {
                    try {
                        return JSON.parse(localStorage.getItem('cart')) || [];
                    } catch {
                        return [];
                    }
                });

                React.useEffect(() => {
                    localStorage.setItem('cart', JSON.stringify(items));
                }, [items]);

                const addToCart = (product, quantity = 1) => {
                    setItems(prev => {
                        const existing = prev.find(item => item.id === product.id);
                        if (existing) {
                            return prev.map(item => 
                                item.id === product.id 
                                    ? { ...item, quantity: item.quantity + quantity }
                                    : item
                            );
                        }
                        return [...prev, { ...product, quantity }];
                    });
                };

                const removeFromCart = (id) => {
                    setItems(prev => prev.filter(item => item.id !== id));
                };

                const updateQuantity = (id, quantity) => {
                    if (quantity <= 0) {
                        removeFromCart(id);
                        return;
                    }
                    setItems(prev => prev.map(item => 
                        item.id === id ? { ...item, quantity } : item
                    ));
                };

                const getTotal = () => items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const getCount = () => items.reduce((sum, item) => sum + item.quantity, 0);

                return React.createElement(
                    CartContext.Provider, 
                    { value: { items, addToCart, removeFromCart, updateQuantity, getTotal, getCount } },
                    children
                );
            };

            // ==================== HOOKS ====================
            const useAuth = () => {
                const context = React.useContext(AuthContext);
                if (!context) throw new Error('useAuth must be used within AuthProvider');
                return context;
            };

            const useCart = () => {
                const context = React.useContext(CartContext);
                if (!context) throw new Error('useCart must be used within CartProvider');
                return context;
            };

            // ==================== COMPONENTS ====================
            const Header = () => {
                const { user, logout } = useAuth();
                const { getCount } = useCart();
                const count = getCount();

                return React.createElement(
                    'header',
                    { className: 'bg-white shadow-md sticky top-0 z-50' },
                    React.createElement(
                        'div',
                        { className: 'container mx-auto px-4' },
                        React.createElement(
                            'div',
                            { className: 'flex items-center justify-between h-20' },
                            React.createElement(
                                'a',
                                { href: '#/', className: 'text-2xl font-bold text-[#C41E3A]' },
                                'ATS'
                            ),
                            React.createElement(
                                'nav',
                                { className: 'flex items-center gap-6' },
                                React.createElement('a', { href: '#/', className: 'hover:text-[#C41E3A]' }, 'Home'),
                                React.createElement('a', { href: '#/shop', className: 'hover:text-[#C41E3A]' }, 'Shop'),
                                React.createElement(
                                    'a',
                                    { href: '#/cart', className: 'relative' },
                                    React.createElement('i', { className: 'fa-solid fa-cart-shopping text-xl' }),
                                    count > 0 && React.createElement(
                                        'span',
                                        { className: 'absolute -top-2 -right-2 bg-[#C41E3A] text-white rounded-full w-5 h-5 text-xs flex items-center justify-center' },
                                        count
                                    )
                                ),
                                user ? React.createElement(
                                    React.Fragment,
                                    null,
                                    React.createElement('span', { className: 'text-sm' }, user.firstName || user.email),
                                    React.createElement('button', { onClick: logout, className: 'text-sm text-red-600 ml-2' }, 'Logout')
                                ) : React.createElement('a', { href: '#/login', className: 'btn btn-primary text-sm py-2' }, 'Login')
                            )
                        )
                    )
                );
            };

            const Footer = () => {
                return React.createElement(
                    'footer',
                    { className: 'bg-gray-900 text-white py-12 mt-20' },
                    React.createElement(
                        'div',
                        { className: 'container mx-auto px-4 text-center' },
                        React.createElement('p', { className: 'text-sm' }, '© 2026 Afrika Tikkun. All rights reserved.'),
                        React.createElement('p', { className: 'text-xs text-gray-400 mt-2' }, '100% of proceeds support youth empowerment')
                    )
                );
            };

            const ProductCard = ({ product }) => {
                return React.createElement(
                    'div',
                    { className: 'bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow' },
                    React.createElement('img', { src: product.image, alt: product.name, className: 'w-full h-64 object-cover' }),
                    React.createElement(
                        'div',
                        { className: 'p-6' },
                        React.createElement('h3', { className: 'text-xl font-bold mb-2' }, product.name),
                        React.createElement('p', { className: 'text-gray-600 text-sm mb-4 line-clamp-2' }, product.description),
                        React.createElement(
                            'div',
                            { className: 'flex items-center justify-between' },
                            React.createElement('span', { className: 'text-2xl font-bold text-[#C41E3A]' }, `R ${product.price}`),
                            React.createElement('a', { href: `#/product/${product.id}`, className: 'btn btn-primary text-sm' }, 'View')
                        )
                    )
                );
            };

            const Home = () => {
                return React.createElement(
                    'div',
                    null,
                    React.createElement(
                        'section',
                        { className: 'bg-gradient-to-r from-[#C41E3A] to-[#CC5500] text-white py-20 text-center' },
                        React.createElement('h1', { className: 'text-4xl md:text-5xl font-bold mb-6' }, 'Support the Mission'),
                        React.createElement('p', { className: 'text-xl mb-8' }, '100% of proceeds empower youth across Africa'),
                        React.createElement('a', { href: '#/shop', className: 'btn bg-white text-[#C41E3A] px-8 py-4 text-lg' }, 'Shop Now')
                    ),
                    React.createElement(
                        'section',
                        { className: 'py-16 container mx-auto px-4' },
                        React.createElement('h2', { className: 'text-3xl font-bold text-center mb-12' }, 'Featured Products'),
                        React.createElement(
                            'div',
                            { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8' },
                            products.slice(0, 3).map(product => React.createElement(ProductCard, { key: product.id, product }))
                        )
                    )
                );
            };

            const Shop = () => {
                return React.createElement(
                    'div',
                    { className: 'py-12 container mx-auto px-4' },
                    React.createElement('h1', { className: 'text-4xl font-bold text-center mb-12' }, 'Our Merchandise'),
                    React.createElement(
                        'div',
                        { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8' },
                        products.map(product => React.createElement(ProductCard, { key: product.id, product }))
                    )
                );
            };

            const ProductDetail = () => {
                const [quantity, setQuantity] = React.useState(1);
                const { addToCart } = useCart();
                const id = parseInt(window.location.hash.split('/')[2]);
                const product = products.find(p => p.id === id);

                if (!product) {
                    return React.createElement('div', { className: 'text-center py-20' }, 'Product not found');
                }

                return React.createElement(
                    'div',
                    { className: 'py-12 container mx-auto px-4' },
                    React.createElement(
                        'div',
                        { className: 'bg-white p-8 rounded-xl shadow-lg max-w-4xl mx-auto' },
                        React.createElement(
                            'div',
                            { className: 'grid md:grid-cols-2 gap-8' },
                            React.createElement('img', { src: product.image, alt: product.name, className: 'w-full rounded-lg' }),
                            React.createElement(
                                'div',
                                null,
                                React.createElement('h1', { className: 'text-3xl font-bold mb-4' }, product.name),
                                React.createElement('p', { className: 'text-gray-600 mb-6' }, product.description),
                                React.createElement('p', { className: 'text-3xl font-bold text-[#C41E3A] mb-6' }, `R ${product.price}`),
                                React.createElement(
                                    'div',
                                    { className: 'flex items-center gap-4 mb-6' },
                                    React.createElement('button', { onClick: () => setQuantity(Math.max(1, quantity - 1)), className: 'w-10 h-10 border rounded' }, '-'),
                                    React.createElement('span', { className: 'text-xl' }, quantity),
                                    React.createElement('button', { onClick: () => setQuantity(quantity + 1), className: 'w-10 h-10 border rounded' }, '+')
                                ),
                                React.createElement(
                                    'button',
                                    {
                                        onClick: () => {
                                            addToCart(product, quantity);
                                            window.location.hash = '#/cart';
                                        },
                                        className: 'w-full btn btn-primary py-4'
                                    },
                                    'Add to Cart'
                                )
                            )
                        )
                    )
                );
            };

            const Cart = () => {
                const { items, removeFromCart, updateQuantity, getTotal } = useCart();
                const total = getTotal();

                if (items.length === 0) {
                    return React.createElement(
                        'div',
                        { className: 'text-center py-20' },
                        React.createElement('i', { className: 'fa-solid fa-cart-shopping text-6xl text-gray-300 mb-4' }),
                        React.createElement('h2', { className: 'text-2xl mb-4' }, 'Your cart is empty'),
                        React.createElement('a', { href: '#/shop', className: 'btn btn-primary' }, 'Shop Now')
                    );
                }

                return React.createElement(
                    'div',
                    { className: 'py-12 container mx-auto px-4' },
                    React.createElement('h1', { className: 'text-3xl font-bold mb-8' }, 'Shopping Cart'),
                    React.createElement(
                        'div',
                        { className: 'grid lg:grid-cols-3 gap-8' },
                        React.createElement(
                            'div',
                            { className: 'lg:col-span-2' },
                            items.map((item, index) => React.createElement(
                                'div',
                                { key: item.id, className: `bg-white p-6 ${index !== items.length - 1 ? 'border-b' : ''}` },
                                React.createElement(
                                    'div',
                                    { className: 'flex gap-4' },
                                    React.createElement('img', { src: item.image, className: 'w-20 h-20 object-cover rounded' }),
                                    React.createElement(
                                        'div',
                                        { className: 'flex-1' },
                                        React.createElement('h3', { className: 'font-semibold' }, item.name),
                                        React.createElement('p', { className: 'text-[#C41E3A] font-bold mt-2' }, `R ${item.price}`),
                                        React.createElement(
                                            'div',
                                            { className: 'flex items-center gap-4 mt-2' },
                                            React.createElement(
                                                'div',
                                                { className: 'flex items-center border rounded' },
                                                React.createElement('button', { onClick: () => updateQuantity(item.id, item.quantity - 1), className: 'px-3 py-1' }, '-'),
                                                React.createElement('span', { className: 'px-4 py-1 border-x' }, item.quantity),
                                                React.createElement('button', { onClick: () => updateQuantity(item.id, item.quantity + 1), className: 'px-3 py-1' }, '+')
                                            ),
                                            React.createElement('button', { onClick: () => removeFromCart(item.id), className: 'text-red-600 text-sm' }, 'Remove')
                                        )
                                    )
                                )
                            ))
                        ),
                        React.createElement(
                            'div',
                            { className: 'lg:col-span-1' },
                            React.createElement(
                                'div',
                                { className: 'bg-white p-6 rounded-lg shadow sticky top-24' },
                                React.createElement('h2', { className: 'text-xl font-bold mb-4' }, `Total: R ${total.toFixed(2)}`),
                                React.createElement('a', { href: '#/checkout', className: 'w-full btn btn-primary py-3 text-center block' }, 'Checkout')
                            )
                        )
                    )
                );
            };

            const Login = () => {
                const [email, setEmail] = React.useState('');
                const [password, setPassword] = React.useState('');
                const [error, setError] = React.useState('');
                const { login } = useAuth();

                const handleSubmit = async (e) => {
                    e.preventDefault();
                    const success = await login(email, password);
                    if (success) {
                        window.location.hash = '#/';
                    } else {
                        setError('Invalid credentials');
                    }
                };

                return React.createElement(
                    'div',
                    { className: 'min-h-screen flex items-center justify-center py-12 px-4' },
                    React.createElement(
                        'div',
                        { className: 'bg-white p-8 rounded-xl shadow-lg w-full max-w-md' },
                        React.createElement('h2', { className: 'text-2xl font-bold text-center mb-8' }, 'Login'),
                        error && React.createElement('div', { className: 'bg-red-50 text-red-600 p-3 rounded-lg mb-4' }, error),
                        React.createElement(
                            'form',
                            { onSubmit: handleSubmit },
                            React.createElement('input', {
                                type: 'email',
                                placeholder: 'Email',
                                value: email,
                                onChange: (e) => setEmail(e.target.value),
                                className: 'w-full p-3 border rounded-lg mb-4',
                                required: true
                            }),
                            React.createElement('input', {
                                type: 'password',
                                placeholder: 'Password',
                                value: password,
                                onChange: (e) => setPassword(e.target.value),
                                className: 'w-full p-3 border rounded-lg mb-4',
                                required: true
                            }),
                            React.createElement('p', { className: 'text-sm text-gray-500 mb-4' }, 'Demo: admin@afrikatikkun.org / admin123'),
                            React.createElement('button', { type: 'submit', className: 'w-full btn btn-primary py-3' }, 'Sign In')
                        )
                    )
                );
            };

            const Checkout = () => {
                const { items, getTotal } = useCart();
                const total = getTotal();

                return React.createElement(
                    'div',
                    { className: 'py-12 container mx-auto px-4 max-w-2xl' },
                    React.createElement(
                        'div',
                        { className: 'bg-white p-8 rounded-xl shadow-lg' },
                        React.createElement('h1', { className: 'text-2xl font-bold mb-6' }, 'Checkout'),
                        items.map(item => React.createElement(
                            'div',
                            { key: item.id, className: 'flex justify-between mb-2' },
                            React.createElement('span', null, `${item.name} x${item.quantity}`),
                            React.createElement('span', null, `R ${(item.price * item.quantity).toFixed(2)}`)
                        )),
                        React.createElement(
                            'div',
                            { className: 'border-t pt-4 mt-4 font-bold flex justify-between' },
                            React.createElement('span', null, 'Total:'),
                            React.createElement('span', { className: 'text-[#C41E3A]' }, `R ${total.toFixed(2)}`)
                        ),
                        React.createElement(
                            'div',
                            { className: 'bg-green-50 text-green-700 p-4 rounded-lg my-4' },
                            'Demo Mode - Payment successful!'
                        ),
                        React.createElement('a', { href: '#/success', className: 'w-full btn btn-primary py-3 text-center block' }, 'Complete Order')
                    )
                );
            };

            const Success = () => {
                return React.createElement(
                    'div',
                    { className: 'min-h-screen flex items-center justify-center' },
                    React.createElement(
                        'div',
                        { className: 'bg-white p-8 rounded-xl shadow-lg text-center' },
                        React.createElement('i', { className: 'fa-solid fa-circle-check text-6xl text-green-500 mb-4' }),
                        React.createElement('h1', { className: 'text-2xl font-bold mb-4' }, 'Order Successful!'),
                        React.createElement('p', { className: 'mb-6' }, 'Thank you for your support'),
                        React.createElement('a', { href: '#/shop', className: 'btn btn-primary' }, 'Continue Shopping')
                    )
                );
            };

            // ==================== MAIN APP ====================
            const App = () => {
                const [currentPath, setCurrentPath] = React.useState(window.location.hash || '#/');

                React.useEffect(() => {
                    const handleHashChange = () => {
                        setCurrentPath(window.location.hash || '#/');
                    };
                    window.addEventListener('hashchange', handleHashChange);
                    if (!window.location.hash) {
                        window.location.hash = '#/';
                    }
                    return () => window.removeEventListener('hashchange', handleHashChange);
                }, []);

                const renderPage = () => {
                    const path = currentPath.split('?')[0];
                    
                    if (path.startsWith('#/product/')) return React.createElement(ProductDetail);
                    if (path === '#/shop') return React.createElement(Shop);
                    if (path === '#/cart') return React.createElement(Cart);
                    if (path === '#/checkout') return React.createElement(Checkout);
                    if (path === '#/success') return React.createElement(Success);
                    if (path === '#/login') return React.createElement(Login);
                    
                    return React.createElement(Home);
                };

                return React.createElement(
                    AuthProvider,
                    null,
                    React.createElement(
                        CartProvider,
                        null,
                        React.createElement(
                            'div',
                            { className: 'flex flex-col min-h-screen' },
                            React.createElement(Header, null),
                            React.createElement('main', { className: 'flex-grow' }, renderPage()),
                            React.createElement(Footer, null)
                        )
                    )
                );
            };

            // ==================== RENDER ====================
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(App));
        })();
    </script>
</body>
    </html>
