    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
        }

        /* Cyberpunk glass morphism */
        .cyber-glass {
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .cyber-card {
            background: linear-gradient(145deg, rgba(30, 30, 40, 0.9), rgba(20, 20, 30, 0.95));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(196, 30, 58, 0.2);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .cyber-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #C41E3A, #FF6B4A, #C41E3A);
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.4s;
            z-index: -1;
        }

        .cyber-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(196, 30, 58, 0.4);
            box-shadow: 0 20px 40px -15px rgba(196, 30, 58, 0.5);
        }

        .cyber-card:hover::before {
            opacity: 0.5;
            filter: blur(10px);
        }

        /* Neon text effects */
        .neon-text {
            text-shadow: 0 0 10px rgba(196, 30, 58, 0.5),
                         0 0 20px rgba(196, 30, 58, 0.3),
                         0 0 30px rgba(196, 30, 58, 0.1);
        }

        .neon-border {
            box-shadow: 0 0 10px rgba(196, 30, 58, 0.3),
                        0 0 20px rgba(196, 30, 58, 0.2);
        }

        /* Animated gradient background */
        .cyber-bg {
            background: radial-gradient(circle at 20% 30%, rgba(196, 30, 58, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255, 107, 74, 0.15) 0%, transparent 50%),
                        #0a0a0f;
            position: relative;
        }

        .cyber-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #C41E3A, #FF6B4A, #C41E3A, transparent);
        }

        /* Auto-sliding showcase */
        .slider-container {
            position: relative;
            overflow: hidden;
            border-radius: 32px;
            height: 500px;
        }

        .slider-track {
            display: flex;
            width: 400%;
            height: 100%;
            animation: slide 20s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slider-track:hover {
            animation-play-state: paused;
        }

        .slide {
            width: 25%;
            height: 100%;
            position: relative;
        }

        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        .slide-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            width: 80%;
            max-width: 600px;
        }

        @keyframes slide {
            0%, 20% { transform: translateX(0); }
            25%, 45% { transform: translateX(-25%); }
            50%, 70% { transform: translateX(-50%); }
            75%, 95% { transform: translateX(-75%); }
            100% { transform: translateX(0); }
        }

        /* Product image styles */
        .product-image {
            position: relative;
            overflow: hidden;
            border-radius: 20px 20px 0 0;
            height: 280px;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .cyber-card:hover .product-image img {
            transform: scale(1.1);
        }

        .quick-view {
            position: absolute;
            bottom: -60px;
            left: 0;
            right: 0;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px;
            transition: bottom 0.3s ease;
            border-top: 1px solid rgba(196, 30, 58, 0.3);
        }

        .cyber-card:hover .quick-view {
            bottom: 0;
        }

        /* Category chips */
        .cyber-chip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            transition: all 0.3s;
            color: rgba(255, 255, 255, 0.8);
        }

        .cyber-chip:hover,
        .cyber-chip.active {
            background: rgba(196, 30, 58, 0.2);
            border-color: #C41E3A;
            box-shadow: 0 0 20px rgba(196, 30, 58, 0.3);
            color: white;
        }

        /* Buttons */
        .btn-cyber {
            background: linear-gradient(135deg, #C41E3A, #FF6B4A);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .btn-cyber::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .btn-cyber:hover::before {
            left: 100%;
        }

        .btn-cyber:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -8px rgba(196, 30, 58, 0.6);
        }

        .btn-outline-cyber {
            background: transparent;
            border: 2px solid #C41E3A;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-outline-cyber:hover {
            background: #C41E3A;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -8px rgba(196, 30, 58, 0.4);
        }

        /* Cart badge */
        .cyber-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: linear-gradient(135deg, #C41E3A, #FF6B4A);
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        /* Price tag */
        .price-cyber {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #C41E3A, #FF6B4A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Loading spinner */
        .cyber-spinner {
            border: 3px solid rgba(196, 30, 58, 0.1);
            border-top-color: #C41E3A;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Quantity selector */
        .cyber-quantity {
            display: inline-flex;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
        }

        .cyber-quantity button {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }

        .cyber-quantity button:hover {
            background: rgba(196, 30, 58, 0.3);
        }

        .cyber-quantity input {
            width: 60px;
            text-align: center;
            background: transparent;
            border: none;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: 600;
        }

        /* Futuristic scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a24;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #C41E3A, #FF6B4A);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #FF6B4A, #C41E3A);
        }
    </style>
</head>

                    details: ['Holographic', 'Magnetic closure', 'RFID blocking', 'UV protection', 'One size'],

                }
            ];

            const categories = ['All', 'Hoodies', 'T-Shirts', 'Bottles', 'Cups', 'Bags', 'Caps'];

            // ==================== CONTEXT ====================
            const AuthContext = React.createContext(null);
            const CartContext = React.createContext(null);

            // ==================== AUTH PROVIDER ====================
            const AuthProvider = ({ children }) => {
                const [user, setUser] = React.useState(() => {
                    try {
                        return JSON.parse(localStorage.getItem('user')) || null;
                    } catch {
                        return null;
                    }
                });

                const login = async (email, password) => {
                    if (email === 'nomathemba@gmail.com' && password === 'Thembi') {
                        const userData = { 
                            id: 1, 
                            email: 'nomathemba@gmail.com',
                            firstName: 'Nomathemba',
                            lastName: 'Thembi',
                            roles: ['ROLE_ADMIN'],
                            lastLogin: new Date().toISOString()
                        };
                        setUser(userData);
                        localStorage.setItem('user', JSON.stringify(userData));
                        return { success: true, user: userData };
                    }
                    
                    if (email && password) {
                        const userData = { 
                            id: 2, 
                            email,
                            firstName: email.split('@')[0],
                            lastName: 'User',
                            roles: ['ROLE_USER']
                        };
                        setUser(userData);
                        localStorage.setItem('user', JSON.stringify(userData));
                        return { success: true, user: userData };
                    }
                    
                    return { success: false, error: 'Invalid credentials' };
                };

                const logout = () => {
                    setUser(null);
                    localStorage.removeItem('user');
                };

                const isAdmin = () => user?.roles?.includes('ROLE_ADMIN') || false;

                return React.createElement(
                    AuthContext.Provider,
                    { value: { user, login, logout, isAdmin } },
                    children
                );
            };

            // ==================== CART PROVIDER ====================
            const CartProvider = ({ children }) => {
                const [items, setItems] = React.useState(() => {
                    try {
                        return JSON.parse(localStorage.getItem('cart')) || [];
                    } catch {
                        return [];
                    }
                });

                React.useEffect(() => {
                    localStorage.setItem('cart', JSON.stringify(items));
                }, [items]);

                const addToCart = (product, quantity = 1) => {
                    setItems(prev => {
                        const existing = prev.find(item => item.id === product.id);
                        if (existing) {
                            return prev.map(item => 
                                item.id === product.id 
                                    ? { ...item, quantity: item.quantity + quantity }
                                    : item
                            );
                        }
                        return [...prev, { ...product, quantity }];
                    });
                };

                const removeFromCart = (id) => {
                    setItems(prev => prev.filter(item => item.id !== id));
                };

                const updateQuantity = (id, quantity) => {
                    if (quantity <= 0) {
                        removeFromCart(id);
                        return;
                    }
                    setItems(prev => prev.map(item => 
                        item.id === id ? { ...item, quantity } : item
                    ));
                };

                const getTotal = () => items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const getCount = () => items.reduce((sum, item) => sum + item.quantity, 0);

                return React.createElement(
                    CartContext.Provider,
                    { value: { items, addToCart, removeFromCart, updateQuantity, getTotal, getCount } },
                    children
                );
            };

            // ==================== HOOKS ====================
            const useAuth = () => React.useContext(AuthContext);
            const useCart = () => React.useContext(CartContext);

            // ==================== LOGO ====================

                ),
                React.createElement(
                    'div',
                    { className: 'flex flex-col' },
                    React.createElement('span', { className: 'font-bold text-white' }, 'Afrika Tikkun'),

                )
            );

                const featured = products.filter(p => p.featured).slice(0, 4);
                
                return React.createElement(
                    'div',
                    { className: 'slider-container cyber-card mb-12' },

                        { className: 'slider-track' },
                        featured.map((product, index) => React.createElement(

                            { key: index, className: 'slide' },
                            React.createElement('img', {

                            }),
                            React.createElement(
                                'div',
                                { className: 'slide-content' },
                                React.createElement('span', { className: 'text-sm uppercase tracking-wider text-[#FF6B4A] mb-2 block' }, 'Featured Collection'),
                                React.createElement('h2', { className: 'text-4xl md:text-5xl font-bold mb-4 neon-text' }, product.name),

                                )
                            )
                        ))
                    ),
                    // Slide indicators
                    React.createElement(
                        'div',

                        [0, 1, 2, 3].map(i => React.createElement(

            // ==================== CHATBOT ====================
            const ChatBot = () => {
                const [isOpen, setIsOpen] = React.useState(false);
                const [messages, setMessages] = React.useState([
                    { id: 1, sender: 'bot', text: 'Welcome to Afrika Tikkun. How may I assist you today?', time: new Date().toLocaleTimeString() }
                ]);
                const [input, setInput] = React.useState('');
                const messagesEndRef = React.useRef(null);

                React.useEffect(() => {
                    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                }, [messages]);

                const handleSend = () => {
                    if (!input.trim()) return;
                    
                    const userMsg = { id: Date.now(), sender: 'user', text: input, time: new Date().toLocaleTimeString() };
                    setMessages(prev => [...prev, userMsg]);
                    
                    const lower = input.toLowerCase();
                    let response = '';
                    
                    if (lower.includes('hoodie')) response = 'Our hoodies range from R450-R480. The NEBULA and ZENITH are our most advanced.';
                    else if (lower.includes('shirt') || lower.includes('tee')) response = 'T-shirts start at R250. The ORIGIN features our signature heat-map print.';
                    else if (lower.includes('bottle')) response = 'Smart bottles from R180-R220 with temperature display available.';
                    else if (lower.includes('shipping')) response = 'Free shipping on all orders. Delivery within 3-5 business days.';
                    else if (lower.includes('return')) response = '30-day return policy with full refund guarantee.';
                    else if (lower.includes('mission')) response = '100% of proceeds fund youth development programs across South Africa.';
                    else if (lower.includes('nomathemba') || lower.includes('thembi')) response = 'Welcome, Nomathemba! You have admin access to the platform.';
                    else if (lower.includes('hello') || lower.includes('hi')) response = 'Hello! How may I assist you today?';
                    else response = 'I can help with product information, pricing, shipping, and returns. What would you like to know?';
                    
                    setTimeout(() => {
                        setMessages(prev => [...prev, { id: Date.now(), sender: 'bot', text: response, time: new Date().toLocaleTimeString() }]);
                    }, 500);
                    
                    setInput('');
                };

                return React.createElement(
                    'div',
                    { className: 'fixed bottom-6 right-6 z-50' },
                    isOpen && React.createElement(
                        'div',
                        { className: 'w-80 cyber-card overflow-hidden' },

                    window.addEventListener('hashchange', handleHashChange);
                    if (!window.location.hash) window.location.hash = '#/';
                    return () => window.removeEventListener('hashchange', handleHashChange);
                }, []);

                const renderPage = () => {
                    const path = currentPath.split('?')[0];
                    
                    if (path.startsWith('#/product/')) return React.createElement(ProductDetail);
                    if (path === '#/admin') return React.createElement(AdminDashboard);
