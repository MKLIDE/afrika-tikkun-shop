        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #faf7f2;
            color: #2c2c2c;
        }

        /* Original Afrika Tikkun Colors */
        :root {
            --primary-red: #C41E3A;
            --primary-red-light: #d8455e;
            --primary-red-dark: #9e182f;
            --gold: #D4AF37;
            --gold-light: #e5c564;
            --gold-dark: #b8960c;
            --cream: #fdf6e9;
            --charcoal: #2c2c2c;
            --off-white: #faf7f2;
        }

        /* ===== SMOOTH 2050 ADDITIONS ===== */
        html {
            scroll-behavior: smooth;
        }

        /* Ultra-smooth transitions */
        .heritage-card, .btn-primary, .btn-gold, .btn-outline, .heritage-chip, a {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Magnetic button effect */
        .btn-primary:hover, .btn-gold:hover, .btn-outline:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 20px 30px -10px var(--primary-red);
        }

        .btn-primary:active, .btn-gold:active, .btn-outline:active {
            transform: scale(0.98);
        }

        /* Ripple effect on click */
        .btn-primary, .btn-gold, .btn-outline {
            position: relative;
            overflow: hidden;
        }

        .btn-primary::after, .btn-gold::after, .btn-outline::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s, opacity 0.6s;
            opacity: 0;
            pointer-events: none;
        }

        .btn-primary:active::after, .btn-gold:active::after, .btn-outline:active::after {
            width: 300px;
            height: 300px;
            opacity: 1;
        }

        /* Smooth card hover */
        .heritage-card {
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .heritage-card:hover {
            transform: translateY(-10px) scale(1.02);
        }

        /* Smooth image zoom */
        .product-image img {
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .heritage-card:hover .product-image img {
            transform: scale(1.1);
        }

        /* Smooth category chips */
        .heritage-chip {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .heritage-chip:hover {
            transform: scale(1.1) translateY(-2px);
        }

        /* Smooth quick view */
        .quick-view {
            transition: bottom 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Smooth quantity buttons */
        .heritage-quantity button {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .heritage-quantity button:hover {
            background: var(--primary-red);
            color: white;
            transform: scale(1.1);
        }

        /* Smooth slider */
        .slider-track {
            animation: smoothSlide 25s infinite cubic-bezier(0.45, 0.05, 0.2, 0.99);
        }

        @keyframes smoothSlide {
            0%, 20% { transform: translateX(0); }
            25%, 45% { transform: translateX(-25%); }
            50%, 70% { transform: translateX(-50%); }
            75%, 95% { transform: translateX(-75%); }
            100% { transform: translateX(0); }
        }

        /* Floating animation for special elements */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .float {
            animation: float 4s ease-in-out infinite;
        }

        /* Smooth scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--cream);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-red);
            border-radius: 5px;
            transition: all 0.3s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-red-dark);
        }

        /* Glass morphism with original colors */
        .heritage-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(196, 30, 58, 0.1);
            box-shadow: 0 8px 32px rgba(196, 30, 58, 0.08);
        }

        .heritage-card {
            background: white;
            border: 1px solid rgba(196, 30, 58, 0.15);
            border-radius: 24px;
            box-shadow: 0 10px 30px -10px rgba(196, 30, 58, 0.2);
            position: relative;
            overflow: hidden;
        }

        .heritage-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-red), var(--gold), var(--primary-red));
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .heritage-card:hover {
            border-color: var(--primary-red);
            box-shadow: 0 20px 40px -15px rgba(196, 30, 58, 0.3);
        }

        .heritage-card:hover::before {
            transform: translateX(0);
        }

        /* Gold accents */
        .gold-gradient {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
        }

        .red-gradient {
            background: linear-gradient(135deg, var(--primary-red), var(--primary-red-light));
        }

        .heritage-gradient {
            background: linear-gradient(135deg, var(--primary-red), var(--gold));
        }

        /* Elegant glow effects */
        .red-glow {
            box-shadow: 0 0 20px rgba(196, 30, 58, 0.15);
        }

        .gold-glow {
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .heritage-glow {
            box-shadow: 0 0 30px rgba(196, 30, 58, 0.1), 0 0 30px rgba(212, 175, 55, 0.1);
        }

        /* Animated background pattern */
        .heritage-bg {
            background: var(--off-white);
            position: relative;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(196, 30, 58, 0.03) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.03) 0%, transparent 30%),
                repeating-linear-gradient(45deg, rgba(196, 30, 58, 0.01) 0px, rgba(196, 30, 58, 0.01) 1px, transparent 1px, transparent 10px);
        }

        /* Slider with heritage colors */
        .slider-container {
            position: relative;
            overflow: hidden;
            border-radius: 32px;
            height: 500px;
            border: 1px solid rgba(196, 30, 58, 0.2);
        }

        .slider-track {
            display: flex;
            width: 400%;
            height: 100%;
        }

        .slider-track:hover {
            animation-play-state: paused;
        }

        .slide {
            width: 25%;
            height: 100%;
            position: relative;
        }

        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, rgba(196, 30, 58, 0.1), rgba(212, 175, 55, 0.1));
            z-index: 1;
        }

        .slide-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            width: 80%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 30px;
            border: 1px solid rgba(196, 30, 58, 0.2);
            backdrop-filter: blur(10px);
        }

        /* Product image styles */
        .product-image {
            position: relative;
            overflow: hidden;
            border-radius: 20px 20px 0 0;
            height: 280px;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .quick-view {
            position: absolute;
            bottom: -60px;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-top: 1px solid var(--primary-red);
        }

        .heritage-card:hover .quick-view {
            bottom: 0;
        }

        /* Category chips */
        .heritage-chip {
            background: white;
            border: 1px solid rgba(196, 30, 58, 0.2);
            color: var(--charcoal);
        }

        .heritage-chip:hover,
        .heritage-chip.active {
            background: var(--primary-red);
            border-color: var(--primary-red);
            color: white;
            box-shadow: 0 5px 15px rgba(196, 30, 58, 0.3);
        }

        /* Buttons */
        .btn-primary {
            background: var(--primary-red);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: 1px solid var(--primary-red);
            cursor: pointer;
        }

        .btn-primary:hover {
            background: var(--primary-red-dark);
        }

        .btn-gold {
            background: var(--gold);
            color: var(--charcoal);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-gold:hover {
            background: var(--gold-dark);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary-red);
            color: var(--primary-red);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-outline:hover {
            background: var(--primary-red);
            color: white;
        }

        /* Cart badge */
        .heritage-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--primary-red);
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Price tag */
        .price-heritage {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-red);
        }

        /* Loading spinner */
        .heritage-spinner {
            border: 3px solid rgba(196, 30, 58, 0.1);
            border-top-color: var(--primary-red);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Quantity selector */
        .heritage-quantity {
            display: inline-flex;
            border: 1px solid rgba(196, 30, 58, 0.2);
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }

        .heritage-quantity button {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: none;
            color: var(--charcoal);
            cursor: pointer;
        }

        .heritage-quantity input {
            width: 60px;
            text-align: center;
            background: white;
            border: none;
            border-left: 1px solid rgba(196, 30, 58, 0.1);
            border-right: 1px solid rgba(196, 30, 58, 0.1);
            color: var(--charcoal);
            font-weight: 600;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--cream);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-red);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-red-dark);
        }

        /* Text colors */
        .text-primary-red {
            color: var(--primary-red);
        }

        .text-gold {
            color: var(--gold);
        }

        .bg-primary-red {
            background: var(--primary-red);
        }

        .bg-gold {
            background: var(--gold);
        }

        .border-primary-red {
            border-color: var(--primary-red);
        }

        .border-gold {
            border-color: var(--gold);
        }
    </style>

            const categories = ['All', 'Hoodies', 'T-Shirts', 'Bottles', 'Cups', 'Bags', 'Caps'];

            // ==================== CONTEXT ====================
            const AuthContext = React.createContext(null);
            const CartContext = React.createContext(null);

            // ==================== AUTH PROVIDER ====================
            const AuthProvider = ({ children }) => {
                const [user, setUser] = React.useState(() => {
                    try {
                        return JSON.parse(localStorage.getItem('user')) || null;
                    } catch {
                        return null;
                    }
                });

                const login = async (email, password) => {
                    if (email === 'nomathemba@gmail.com' && password === 'Thembi') {
                        const userData = { 
                            id: 1, 
                            email: 'nomathemba@gmail.com',
                            firstName: 'Nomathemba',
                            lastName: 'Thembi',
                            roles: ['ROLE_ADMIN'],
                            lastLogin: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                        };
                        setUser(userData);
                        localStorage.setItem('user', JSON.stringify(userData));
                        return { success: true, user: userData };
                    }
                    
                    return { success: false, error: 'This demo is exclusively for Nomathemba' };
                };

                const logout = () => {
                    setUser(null);
                    localStorage.removeItem('user');
                };

                const isAdmin = () => user?.roles?.includes('ROLE_ADMIN') || false;

                return React.createElement(
                    AuthContext.Provider,
                    { value: { user, login, logout, isAdmin } },
                    children
                );
            };

            // ==================== CART PROVIDER ====================
            const CartProvider = ({ children }) => {
                const [items, setItems] = React.useState(() => {
                    try {
                        return JSON.parse(localStorage.getItem('cart')) || [];
                    } catch {
                        return [];
                    }
                });

                React.useEffect(() => {
                    localStorage.setItem('cart', JSON.stringify(items));
                }, [items]);

                const addToCart = (product, quantity = 1) => {
                    setItems(prev => {
                        const existing = prev.find(item => item.id === product.id);
                        if (existing) {
                            return prev.map(item => 
                                item.id === product.id 
                                    ? { ...item, quantity: item.quantity + quantity }
                                    : item
                            );
                        }
                        return [...prev, { ...product, quantity }];
                    });
                };

                const removeFromCart = (id) => {
                    setItems(prev => prev.filter(item => item.id !== id));
                };

                const updateQuantity = (id, quantity) => {
                    if (quantity <= 0) {
                        removeFromCart(id);
                        return;
                    }
                    setItems(prev => prev.map(item => 
                        item.id === id ? { ...item, quantity } : item
                    ));
                };

                const getTotal = () => items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const getCount = () => items.reduce((sum, item) => sum + item.quantity, 0);

                return React.createElement(
                    CartContext.Provider,
                    { value: { items, addToCart, removeFromCart, updateQuantity, getTotal, getCount } },
                    children
                );
            };

            // ==================== HOOKS ====================
