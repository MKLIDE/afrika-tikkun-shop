<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afrika Tikkun - Enterprise Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #f8fafc; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.75rem 1.5rem; font-weight: 600; border-radius: 0.5rem; transition: all 0.2s; cursor: pointer; text-decoration: none; }
        .btn-primary { background: #C41E3A; color: white; }
        .btn-primary:hover { background: #9e182f; }
        .btn-outline { border: 2px solid #C41E3A; color: #C41E3A; background: transparent; }
        .btn-outline:hover { background: #C41E3A; color: white; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); transition: all 0.3s; }
        .card:hover { box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); transform: translateY(-2px); }
        .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .badge-primary { background: #fee2e2; color: #C41E3A; }
        .input { width: 100%; padding: 0.75rem 1rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; outline: none; transition: all 0.2s; }
        .input:focus { border-color: #C41E3A; box-shadow: 0 0 0 3px rgba(196,30,58,0.1); }
        .gradient-bg { background: linear-gradient(135deg, #C41E3A 0%, #9e182f 100%); }
        .text-primary { color: #C41E3A; }
        .border-primary { border-color: #C41E3A; }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .chat-container { scrollbar-width: thin; scrollbar-color: #C41E3A #e2e8f0; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 3px; }
        .chat-container::-webkit-scrollbar-thumb { background: #C41E3A; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        (function() {
            // ==================== DATA LAYER ====================
            const products = [
                { id: 1, name: 'Heritage Hoodie', price: 450, category: 'Apparel', image: 'https://images.unsplash.com/photo-1556905055-8f358a7a47b2?w=400', description: 'Premium cotton fleece hoodie with embroidered logo. Unisex fit.', stock: 45 },
                { id: 2, name: 'Legacy T-Shirt', price: 250, category: 'Apparel', image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400', description: '100% combed cotton t-shirt. Classic fit.', stock: 120 },
                { id: 3, name: 'Insulated Bottle', price: 180, category: 'Accessories', image: 'https://images.unsplash.com/photo-1602143407151-7111542de6e8?w=400', description: 'Stainless steel vacuum bottle. 24hr cold retention.', stock: 75 },
                { id: 4, name: 'Ceramic Mug', price: 120, category: 'Accessories', image: 'https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?w=400', description: 'High-quality ceramic mug. Dishwasher safe.', stock: 200 },
                { id: 5, name: 'Drawstring Bag', price: 150, category: 'Accessories', image: 'https://images.unsplash.com/photo-1622560480654-962b1f48a50d?w=400', description: 'Lightweight nylon bag. Perfect for gym or travel.', stock: 85 },
                { id: 6, name: 'Baseball Cap', price: 200, category: 'Apparel', image: 'https://images.unsplash.com/photo-1588850567220-85db1e1c816f?w=400', description: 'Cotton twill cap. Adjustable strap.', stock: 60 }
            ];

            // ==================== CONTEXT ====================
            const AuthContext = React.createContext(null);
            const CartContext = React.createContext(null);

            // ==================== AUTH PROVIDER ====================
            const AuthProvider = ({ children }) => {
                const [user, setUser] = React.useState(() => {
                    try {
                        return JSON.parse(localStorage.getItem('user')) || null;
                    } catch {
                        return null;
                    }
                });

                const login = async (email, password) => {
                    // Special access for Thembi
                    if (email === 'nomathemba@gmail.com' && password === 'Thembi') {
                        const userData = { 
                            id: 1, 
                            email: 'nomathemba@gmail.com',
                            firstName: 'Nomathemba',
                            lastName: 'Thembi',
                            roles: ['ROLE_ADMIN'],
                            lastLogin: new Date().toISOString()
                        };
                        setUser(userData);
                        localStorage.setItem('user', JSON.stringify(userData));
                        return { success: true, user: userData };
                    }
                    
                    // Demo access for other users
                    if (email && password) {
                        const userData = { 
                            id: 2, 
                            email,
                            firstName: email.split('@')[0],
                            lastName: 'User',
                            roles: ['ROLE_USER'],
                            lastLogin: new Date().toISOString()
                        };
                        setUser(userData);
                        localStorage.setItem('user', JSON.stringify(userData));
                        return { success: true, user: userData };
                    }
                    
                    return { success: false, error: 'Invalid credentials' };
                };

                const logout = () => {
                    setUser(null);
                    localStorage.removeItem('user');
                };

                const isAdmin = () => user?.roles?.includes('ROLE_ADMIN') || false;

                return React.createElement(
                    AuthContext.Provider,
                    { value: { user, login, logout, isAdmin } },
                    children
                );
            };

            // ==================== CART PROVIDER ====================
            const CartProvider = ({ children }) => {
                const [items, setItems] = React.useState(() => {
                    try {
                        return JSON.parse(localStorage.getItem('cart')) || [];
                    } catch {
                        return [];
                    }
                });

                React.useEffect(() => {
                    localStorage.setItem('cart', JSON.stringify(items));
                }, [items]);

                const addToCart = (product, quantity = 1) => {
                    setItems(prev => {
                        const existing = prev.find(item => item.id === product.id);
                        if (existing) {
                            return prev.map(item => 
                                item.id === product.id 
                                    ? { ...item, quantity: item.quantity + quantity }
                                    : item
                            );
                        }
                        return [...prev, { ...product, quantity }];
                    });
                };

                const removeFromCart = (id) => {
                    setItems(prev => prev.filter(item => item.id !== id));
                };

                const updateQuantity = (id, quantity) => {
                    if (quantity <= 0) {
                        removeFromCart(id);
                        return;
                    }
                    setItems(prev => prev.map(item => 
                        item.id === id ? { ...item, quantity } : item
                    ));
                };

                const clearCart = () => setItems([]);
                const getTotal = () => items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const getCount = () => items.reduce((sum, item) => sum + item.quantity, 0);

                return React.createElement(
                    CartContext.Provider,
                    { value: { items, addToCart, removeFromCart, updateQuantity, clearCart, getTotal, getCount } },
                    children
                );
            };

            // ==================== HOOKS ====================
            const useAuth = () => React.useContext(AuthContext);
            const useCart = () => React.useContext(CartContext);

            // ==================== COMPONENTS ====================
            const Header = () => {
                const { user, logout } = useAuth();
                const { getCount } = useCart();
                const [menuOpen, setMenuOpen] = React.useState(false);

                return React.createElement(
                    'header',
                    { className: 'bg-white border-b border-gray-200 sticky top-0 z-40' },
                    React.createElement(
                        'div',
                        { className: 'container mx-auto px-4' },
                        React.createElement(
                            'div',
                            { className: 'flex items-center justify-between h-16' },
                            // Logo
                            React.createElement(
                                'a',
                                { href: '#/', className: 'flex items-center gap-2' },
                                React.createElement('div', { className: 'w-8 h-8 gradient-bg rounded-lg' }),
                                React.createElement('span', { className: 'font-bold text-lg' }, 'Afrika Tikkun')
                            ),
                            // Navigation
                            React.createElement(
                                'nav',
                                { className: 'hidden md:flex items-center gap-6' },
                                React.createElement('a', { href: '#/', className: 'text-gray-600 hover:text-primary transition' }, 'Home'),
                                React.createElement('a', { href: '#/shop', className: 'text-gray-600 hover:text-primary transition' }, 'Shop'),
                                React.createElement(
                                    'a',
                                    { href: '#/cart', className: 'relative text-gray-600 hover:text-primary transition' },
                                    React.createElement('i', { className: 'fa-solid fa-cart-shopping' }),
                                    getCount() > 0 && React.createElement(
                                        'span',
                                        { className: 'absolute -top-2 -right-2 w-5 h-5 gradient-bg text-white text-xs rounded-full flex items-center justify-center' },
                                        getCount()
                                    )
                                )
                            ),
                            // User menu
                            React.createElement(
                                'div',
                                { className: 'flex items-center gap-4' },
                                user ? React.createElement(
                                    'div',
                                    { className: 'relative' },
                                    React.createElement(
                                        'button',
                                        { onClick: () => setMenuOpen(!menuOpen), className: 'flex items-center gap-2 text-sm' },
                                        React.createElement('span', null, user.firstName || user.email),
                                        React.createElement('i', { className: 'fa-solid fa-chevron-down text-xs' })
                                    ),
                                    menuOpen && React.createElement(
                                        React.Fragment,
                                        null,
                                        React.createElement('div', { className: 'fixed inset-0', onClick: () => setMenuOpen(false) }),
                                        React.createElement(
                                            'div',
                                            { className: 'absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border py-1' },
                                            user.roles?.includes('ROLE_ADMIN') && React.createElement(
                                                'a',
                                                { href: '#/admin', className: 'block px-4 py-2 text-sm hover:bg-gray-50' },
                                                'Dashboard'
                                            ),
                                            React.createElement(
                                                'button',
                                                { onClick: logout, className: 'block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50' },
                                                'Sign out'
                                            )
                                        )
                                    )
                                ) : React.createElement(
                                    'a',
                                    { href: '#/login', className: 'btn btn-primary text-sm py-2' },
                                    'Sign in'
                                )
                            )
                        )
                    )
                );
            };

            const Footer = () => React.createElement(
                'footer',
                { className: 'bg-gray-900 text-white py-12 mt-20' },
                React.createElement(
                    'div',
                    { className: 'container mx-auto px-4' },
                    React.createElement(
                        'div',
                        { className: 'grid md:grid-cols-4 gap-8' },
                        React.createElement(
                            'div',
                            null,
                            React.createElement('h4', { className: 'font-bold mb-4' }, 'About'),
                            React.createElement('p', { className: 'text-sm text-gray-400' }, 'Developing young people from cradle to career since 1998.')
                        ),
                        React.createElement(
                            'div',
                            null,
                            React.createElement('h4', { className: 'font-bold mb-4' }, 'Contact'),
                            React.createElement('p', { className: 'text-sm text-gray-400' }, 'info@afrikatikkun.org'),
                            React.createElement('p', { className: 'text-sm text-gray-400' }, '+27 11 325 5914')
                        ),
                        React.createElement(
                            'div',
                            null,
                            React.createElement('h4', { className: 'font-bold mb-4' }, 'Legal'),
                            React.createElement('p', { className: 'text-sm text-gray-400' }, 'NPO: 021-892'),
                            React.createElement('p', { className: 'text-sm text-gray-400' }, 'PBO: 18/11/13/2470')
                        ),
                        React.createElement(
                            'div',
                            null,
                            React.createElement('h4', { className: 'font-bold mb-4' }, 'Follow'),
                            React.createElement('div', { className: 'flex gap-4 text-gray-400' },
                                React.createElement('a', { href: '#', className: 'hover:text-white' }, React.createElement('i', { className: 'fab fa-linkedin' })),
                                React.createElement('a', { href: '#', className: 'hover:text-white' }, React.createElement('i', { className: 'fab fa-twitter' })),
                                React.createElement('a', { href: '#', className: 'hover:text-white' }, React.createElement('i', { className: 'fab fa-instagram' }))
                            )
                        )
                    ),
                    React.createElement(
                        'div',
                        { className: 'text-center text-sm text-gray-400 mt-12 pt-8 border-t border-gray-800' },
                        '© 2026 Afrika Tikkun. All rights reserved.'
                    )
                )
            );

            const ProductCard = ({ product, onAddToCart }) => {
                return React.createElement(
                    'div',
                    { className: 'card overflow-hidden' },
                    React.createElement('img', { src: product.image, alt: product.name, className: 'w-full h-48 object-cover' }),
                    React.createElement(
                        'div',
                        { className: 'p-6' },
                        React.createElement(
                            'div',
                            { className: 'flex justify-between items-start mb-2' },
                            React.createElement('h3', { className: 'font-semibold text-lg' }, product.name),
                            React.createElement('span', { className: 'badge badge-primary' }, product.category)
                        ),
                        React.createElement('p', { className: 'text-sm text-gray-600 mb-4' }, product.description),
                        React.createElement(
                            'div',
                            { className: 'flex items-center justify-between' },
                            React.createElement('span', { className: 'font-bold text-lg' }, `R ${product.price}`),
                            React.createElement(
                                'button',
                                { 
                                    onClick: () => onAddToCart(product),
                                    className: 'btn btn-primary text-sm py-2'
                                },
                                'Add to cart'
                            )
                        )
                    )
                );
            };

            // ==================== PAGES ====================
            const Home = () => {
                const { addToCart } = useCart();
                const { user } = useAuth();
                
                return React.createElement(
                    'div',
                    null,
                    // Hero section
                    React.createElement(
                        'section',
                        { className: 'gradient-bg text-white py-20' },
                        React.createElement(
                            'div',
                            { className: 'container mx-auto px-4 text-center' },
                            user?.email === 'nomathemba@gmail.com' 
                                ? React.createElement('h1', { className: 'text-4xl font-bold mb-4' }, `Welcome, ${user.firstName}`)
                                : React.createElement('h1', { className: 'text-4xl font-bold mb-4' }, 'Support the Mission'),
                            React.createElement('p', { className: 'text-xl opacity-90 mb-8 max-w-2xl mx-auto' }, 
                                '100% of proceeds fund youth development programs across South Africa.'
                            ),
                            React.createElement(
                                'a',
                                { href: '#/shop', className: 'btn bg-white text-primary hover:bg-gray-100' },
                                'Browse merchandise'
                            )
                        )
                    ),
                    // Products section
                    React.createElement(
                        'section',
                        { className: 'py-16 container mx-auto px-4' },
                        React.createElement('h2', { className: 'text-2xl font-bold mb-8' }, 'Featured products'),
                        React.createElement(
                            'div',
                            { className: 'grid md:grid-cols-2 lg:grid-cols-3 gap-6' },
                            products.slice(0, 3).map(p => 
                                React.createElement(ProductCard, { key: p.id, product: p, onAddToCart: addToCart })
                            )
                        )
                    ),
                    // Impact stats
                    React.createElement(
                        'section',
                        { className: 'bg-gray-50 py-16' },
                        React.createElement(
                            'div',
                            { className: 'container mx-auto px-4' },
                            React.createElement(
                                'div',
                                { className: 'grid md:grid-cols-3 gap-8 text-center' },
                                React.createElement('div', null, 
                                    React.createElement('div', { className: 'text-3xl font-bold text-primary mb-2' }, '15,000+'),
                                    React.createElement('p', { className: 'text-gray-600' }, 'Youth empowered')
                                ),
                                React.createElement('div', null,
                                    React.createElement('div', { className: 'text-3xl font-bold text-primary mb-2' }, '50+'),
                                    React.createElement('p', { className: 'text-gray-600' }, 'Communities served')
                                ),
                                React.createElement('div', null,
                                    React.createElement('div', { className: 'text-3xl font-bold text-primary mb-2' }, '85%'),
                                    React.createElement('p', { className: 'text-gray-600' }, 'Success rate')
                                )
                            )
                        )
                    )
                );
            };

            const Shop = () => {
                const { addToCart } = useCart();
                return React.createElement(
                    'div',
                    { className: 'py-12 container mx-auto px-4' },
                    React.createElement('h1', { className: 'text-3xl font-bold mb-8' }, 'All merchandise'),
                    React.createElement(
                        'div',
                        { className: 'grid md:grid-cols-2 lg:grid-cols-3 gap-6' },
                        products.map(p => React.createElement(ProductCard, { key: p.id, product: p, onAddToCart: addToCart }))
                    )
                );
            };

            const Cart = () => {
                const { items, removeFromCart, updateQuantity, getTotal } = useCart();
                const { user } = useAuth();

                if (items.length === 0) {
                    return React.createElement(
                        'div',
                        { className: 'py-20 text-center' },
                        React.createElement('i', { className: 'fa-solid fa-cart-shopping text-5xl text-gray-300 mb-4' }),
                        React.createElement('h2', { className: 'text-2xl font-semibold mb-4' }, 'Your cart is empty'),
                        React.createElement('a', { href: '#/shop', className: 'btn btn-primary' }, 'Continue shopping')
                    );
                }

                return React.createElement(
                    'div',
                    { className: 'py-12 container mx-auto px-4' },
                    React.createElement('h1', { className: 'text-2xl font-bold mb-8' }, 'Shopping cart'),
                    React.createElement(
                        'div',
                        { className: 'grid lg:grid-cols-3 gap-8' },
                        React.createElement(
                            'div',
                            { className: 'lg:col-span-2' },
                            items.map((item, idx) => React.createElement(
                                'div',
                                { key: item.id, className: `card p-6 ${idx !== items.length - 1 ? 'mb-4' : ''}` },
                                React.createElement(
                                    'div',
                                    { className: 'flex gap-4' },
                                    React.createElement('img', { src: item.image, className: 'w-20 h-20 object-cover rounded' }),
                                    React.createElement(
                                        'div',
                                        { className: 'flex-1' },
                                        React.createElement('h3', { className: 'font-semibold' }, item.name),
                                        React.createElement('p', { className: 'text-primary font-bold mt-1' }, `R ${item.price}`),
                                        React.createElement(
                                            'div',
                                            { className: 'flex items-center gap-4 mt-2' },
                                            React.createElement(
                                                'div',
                                                { className: 'flex items-center border rounded' },
                                                React.createElement('button', { onClick: () => updateQuantity(item.id, item.quantity - 1), className: 'px-3 py-1 hover:bg-gray-50' }, '-'),
                                                React.createElement('span', { className: 'px-4 py-1 border-x' }, item.quantity),
                                                React.createElement('button', { onClick: () => updateQuantity(item.id, item.quantity + 1), className: 'px-3 py-1 hover:bg-gray-50' }, '+')
                                            ),
                                            React.createElement('button', { onClick: () => removeFromCart(item.id), className: 'text-sm text-red-600 hover:text-red-700' }, 'Remove')
                                        )
                                    )
                                )
                            ))
                        ),
                        React.createElement(
                            'div',
                            { className: 'lg:col-span-1' },
                            React.createElement(
                                'div',
                                { className: 'card p-6 sticky top-20' },
                                React.createElement('h2', { className: 'font-bold text-lg mb-4' }, 'Order summary'),
                                React.createElement(
                                    'div',
                                    { className: 'space-y-2 mb-4' },
                                    React.createElement('div', { className: 'flex justify-between' },
                                        React.createElement('span', null, 'Subtotal'),
                                        React.createElement('span', null, `R ${getTotal().toFixed(2)}`)
                                    ),
                                    React.createElement('div', { className: 'flex justify-between text-green-600' },
                                        React.createElement('span', null, 'Shipping'),
                                        React.createElement('span', null, 'Free')
                                    )
                                ),
                                React.createElement(
                                    'div',
                                    { className: 'border-t pt-4 mb-6' },
                                    React.createElement('div', { className: 'flex justify-between font-bold' },
                                        React.createElement('span', null, 'Total'),
                                        React.createElement('span', { className: 'text-primary' }, `R ${getTotal().toFixed(2)}`)
                                    )
                                ),
                                React.createElement(
                                    'a',
                                    { href: user ? '#/checkout' : '#/login', className: 'btn btn-primary w-full text-center' },
                                    user ? 'Proceed to checkout' : 'Sign in to checkout'
                                )
                            )
                        )
                    )
                );
            };

            const Login = () => {
                const [email, setEmail] = React.useState('');
                const [password, setPassword] = React.useState('');
                const [error, setError] = React.useState('');
                const [loading, setLoading] = React.useState(false);
                const { login } = useAuth();

                const handleSubmit = async (e) => {
                    e.preventDefault();
                    setLoading(true);
                    setError('');
                    
                    const result = await login(email, password);
                    
                    if (result.success) {
                        window.location.hash = '#/';
                    } else {
                        setError('Invalid email or password');
                    }
                    
                    setLoading(false);
                };

                return React.createElement(
                    'div',
                    { className: 'min-h-screen flex items-center justify-center py-12 px-4' },
                    React.createElement(
                        'div',
                        { className: 'card p-8 w-full max-w-md' },
                        React.createElement('h2', { className: 'text-2xl font-bold mb-6 text-center' }, 'Sign in'),
                        
                        error && React.createElement(
                            'div',
                            { className: 'bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm' },
                            error
                        ),

                        React.createElement(
                            'form',
                            { onSubmit: handleSubmit },
                            React.createElement('input', {
                                type: 'email',
                                placeholder: 'Email address',
                                value: email,
                                onChange: (e) => setEmail(e.target.value),
                                className: 'input mb-4',
                                required: true
                            }),
                            React.createElement('input', {
                                type: 'password',
                                placeholder: 'Password',
                                value: password,
                                onChange: (e) => setPassword(e.target.value),
                                className: 'input mb-6',
                                required: true
                            }),

                            React.createElement(
                                'div',
                                { className: 'bg-gray-50 p-4 rounded-lg mb-6 text-sm text-gray-600' },
                                React.createElement('p', { className: 'font-medium mb-2' }, 'Demo credentials:'),
                                React.createElement('p', null, 'Admin: nomathemba@gmail.com / Thembi'),
                                React.createElement('p', null, 'User: any email / any password')
                            ),

                            React.createElement('button', {
                                type: 'submit',
                                disabled: loading,
                                className: 'btn btn-primary w-full'
                            }, loading ? 'Signing in...' : 'Sign in')
                        )
                    )
                );
            };

            const Checkout = () => {
                const { items, getTotal } = useCart();
                
                return React.createElement(
                    'div',
                    { className: 'py-12 container mx-auto px-4 max-w-2xl' },
                    React.createElement(
                        'div',
                        { className: 'card p-8' },
                        React.createElement('h1', { className: 'text-2xl font-bold mb-6' }, 'Checkout'),
                        
                        React.createElement(
                            'div',
                            { className: 'mb-6' },
                            React.createElement('h3', { className: 'font-semibold mb-3' }, 'Order summary'),
                            items.map(item => React.createElement(
                                'div',
                                { key: item.id, className: 'flex justify-between text-sm mb-2' },
                                React.createElement('span', null, `${item.name} x${item.quantity}`),
                                React.createElement('span', null, `R ${(item.price * item.quantity).toFixed(2)}`)
                            ))
                        ),

                        React.createElement(
                            'div',
                            { className: 'border-t pt-4 mb-6' },
                            React.createElement('div', { className: 'flex justify-between font-bold text-lg' },
                                React.createElement('span', null, 'Total'),
                                React.createElement('span', { className: 'text-primary' }, `R ${getTotal().toFixed(2)}`)
                            )
                        ),

                        React.createElement(
                            'div',
                            { className: 'bg-green-50 border border-green-200 rounded-lg p-4 mb-6 text-center' },
                            React.createElement('p', { className: 'text-green-700' }, 'Demo mode - payment successful')
                        ),

                        React.createElement(
                            'div',
                            { className: 'flex gap-4' },
                            React.createElement('a', { href: '#/cart', className: 'btn btn-outline flex-1 text-center' }, 'Back'),
                            React.createElement('a', { href: '#/success', className: 'btn btn-primary flex-1 text-center' }, 'Complete order')
                        )
                    )
                );
            };

            const Success = () => React.createElement(
                'div',
                { className: 'min-h-screen flex items-center justify-center' },
                React.createElement(
                    'div',
                    { className: 'card p-8 text-center max-w-md' },
                    React.createElement('i', { className: 'fa-solid fa-circle-check text-5xl text-green-500 mb-4' }),
                    React.createElement('h1', { className: 'text-2xl font-bold mb-3' }, 'Order confirmed'),
                    React.createElement('p', { className: 'text-gray-600 mb-6' }, 'Thank you for supporting Afrika Tikkun'),
                    React.createElement('a', { href: '#/shop', className: 'btn btn-primary' }, 'Continue shopping')
                )
            );

            const AdminDashboard = () => {
                const { user } = useAuth();
                
                if (!user?.roles?.includes('ROLE_ADMIN')) {
                    window.location.hash = '#/';
                    return null;
                }

                return React.createElement(
                    'div',
                    { className: 'py-12 container mx-auto px-4' },
                    React.createElement('h1', { className: 'text-2xl font-bold mb-8' }, 'Admin dashboard'),
                    React.createElement(
                        'div',
                        { className: 'grid md:grid-cols-3 gap-6' },
                        React.createElement(
                            'div',
                            { className: 'card p-6' },
                            React.createElement('i', { className: 'fa-solid fa-box text-2xl text-primary mb-3' }),
                            React.createElement('h3', { className: 'font-semibold mb-2' }, 'Products'),
                            React.createElement('p', { className: 'text-3xl font-bold' }, '6'),
                            React.createElement('p', { className: 'text-sm text-gray-500 mt-2' }, 'Total items')
                        ),
                        React.createElement(
                            'div',
                            { className: 'card p-6' },
                            React.createElement('i', { className: 'fa-solid fa-users text-2xl text-primary mb-3' }),
                            React.createElement('h3', { className: 'font-semibold mb-2' }, 'Orders'),
                            React.createElement('p', { className: 'text-3xl font-bold' }, '156'),
                            React.createElement('p', { className: 'text-sm text-gray-500 mt-2' }, 'This month')
                        ),
                        React.createElement(
                            'div',
                            { className: 'card p-6' },
                            React.createElement('i', { className: 'fa-solid fa-chart-line text-2xl text-primary mb-3' }),
                            React.createElement('h3', { className: 'font-semibold mb-2' }, 'Revenue'),
                            React.createElement('p', { className: 'text-3xl font-bold' }, 'R 45.2k'),
                            React.createElement('p', { className: 'text-sm text-gray-500 mt-2' }, '+12% vs last month')
                        )
                    )
                );
            };

            // ==================== MAIN APP ====================
            const App = () => {
                const [currentPath, setCurrentPath] = React.useState(window.location.hash || '#/');

                React.useEffect(() => {
                    const handleHashChange = () => {
                        setCurrentPath(window.location.hash || '#/');
                    };
                    window.addEventListener('hashchange', handleHashChange);
                    if (!window.location.hash) {
                        window.location.hash = '#/';
                    }
                    return () => window.removeEventListener('hashchange', handleHashChange);
                }, []);

                const renderPage = () => {
                    const path = currentPath.split('?')[0];
                    
                    if (path === '#/admin') return React.createElement(AdminDashboard);
                    if (path === '#/shop') return React.createElement(Shop);
                    if (path === '#/cart') return React.createElement(Cart);
                    if (path === '#/checkout') return React.createElement(Checkout);
                    if (path === '#/success') return React.createElement(Success);
                    if (path === '#/login') return React.createElement(Login);
                    
                    return React.createElement(Home);
                };

                return React.createElement(
                    AuthProvider,
                    null,
                    React.createElement(
                        CartProvider,
                        null,
                        React.createElement(
                            'div',
                            { className: 'min-h-screen flex flex-col' },
                            React.createElement(Header, null),
                            React.createElement('main', { className: 'flex-grow' }, renderPage()),
                            React.createElement(Footer, null)
                        )
                    )
                );
            };

            // ==================== RENDER ====================
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(App));
        })();
    </script>
</body>
    </html>
