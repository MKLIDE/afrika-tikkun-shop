<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afrika Tikkun - Support the Mission</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.20.0/dist/umd/react-router-dom.development.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }

        .btn {
            @apply inline-flex items-center justify-center px-6 py-3 font-semibold text-base rounded-lg transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed;
        }

        .btn-primary {
            @apply bg-[#C41E3A] text-white hover:bg-[#A81830] focus:ring-[#C41E3A];
        }

        .btn-secondary {
            @apply bg-gray-200 text-gray-900 hover:bg-gray-300 focus:ring-gray-500;
        }

        .btn-outline {
            @apply border-2 border-gray-900 text-gray-900 hover:bg-gray-900 hover:text-white focus:ring-gray-900;
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==================== CONTEXT ====================
        const AuthContext = React.createContext();
        const CartContext = React.createContext();

        // ==================== MOCK DATA ====================
        const mockProducts = [
            {
                id: 1,
                name: 'Afrika Tikkun Heritage Hoodie',
                description: 'Premium quality hoodie featuring the Afrika Tikkun logo. Made from 100% cotton for maximum comfort.',
                price: 450,
                category: { id: 1, name: 'Hoodies' },
                imageUrl: 'https://images.unsplash.com/photo-1556905055-8f358a7a47b2?w=400',
                stock: 50,
                sizes: ['S', 'M', 'L', 'XL', 'XXL'],
                colors: ['Black', 'Red', 'Navy']
            },
            {
                id: 2,
                name: 'Empowerment T-Shirt',
                description: 'Classic fit t-shirt with the empowering message of Afrika Tikkun.',
                price: 250,
                category: { id: 2, name: 'T-Shirts' },
                imageUrl: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400',
                stock: 100,
                sizes: ['S', 'M', 'L', 'XL', 'XXL'],
                colors: ['White', 'Black', 'Red']
            },
            {

                name: 'Stainless Steel Water Bottle',
                description: 'Eco-friendly double-walled stainless steel bottle. Keeps drinks cold for 24 hours.',
                price: 180,

                imageUrl: 'https://images.unsplash.com/photo-1602143407151-7111542de6e8?w=400',
                stock: 75,

            },
            {

                name: 'Ceramic Coffee Mug',
                description: 'Start your day with purpose. High-quality ceramic mug with Afrika Tikkun branding.',
                price: 120,
                category: { id: 4, name: 'Cups' },
                imageUrl: 'https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?w=400',
                stock: 200,

            },
            {
                id: 5,
                name: 'Drawstring Backpack',
                description: 'Lightweight and durable drawstring bag. Perfect for gym or everyday use.',
                price: 150,
                category: { id: 5, name: 'Bags' },
                imageUrl: 'https://images.unsplash.com/photo-1622560480654-962b1f48a50d?w=400',
                stock: 60,
                colors: ['Black', 'Red', 'Blue']
            },
            {
                id: 6,
                name: 'Baseball Cap',
                description: 'Classic 6-panel baseball cap with adjustable strap. Embroidered Afrika Tikkun logo.',
                price: 200,
                category: { id: 6, name: 'Caps' },
                imageUrl: 'https://images.unsplash.com/photo-1588850567220-85db1e1c816f?w=400',
                stock: 85,
                colors: ['Black', 'Red', 'Navy']
            }
        ];

        // ==================== UTILS ====================
        const getUserInitials = (user) => {
            if (!user) return '';
            if (user.firstName && user.lastName) {
                return `${user.firstName[0]}${user.lastName[0]}`.toUpperCase();
            }
            if (user.email) return user.email[0].toUpperCase();
            return 'U';
        };

        const getUserDisplayName = (user) => {
            if (!user) return '';
            if (user.firstName && user.lastName) return `${user.firstName} ${user.lastName}`;
            if (user.email) return user.email.split('@')[0];
            return 'User';
        };

        // ==================== AUTH PROVIDER ====================
        const AuthProvider = ({ children }) => {
            const [user, setUser] = React.useState(null);
            const [loading, setLoading] = React.useState(true);

            React.useEffect(() => {
                const savedUser = localStorage.getItem('ats_user');
                if (savedUser) setUser(JSON.parse(savedUser));
                setLoading(false);
            }, []);

            const login = async (email, password) => {
                let mockUser;
                if (email === 'admin@afrikatikkun.org' && password === 'admin123') {
                    mockUser = { id: 1, email: 'admin@afrikatikkun.org', firstName: 'Admin', lastName: 'User', roles: ['ROLE_ADMIN', 'ROLE_USER'] };
                } else if (email && password) {
                    mockUser = { id: 2, email: email, firstName: email.split('@')[0], lastName: 'User', roles: ['ROLE_USER'] };
                } else {
                    return { success: false, error: 'Invalid credentials' };
                }
                setUser(mockUser);
                localStorage.setItem('ats_user', JSON.stringify(mockUser));
                return { success: true, user: mockUser };
            };

            const signup = async (userData) => {
                const mockUser = { id: Date.now(), email: userData.email, firstName: userData.firstName, lastName: userData.lastName, roles: ['ROLE_USER'] };
                setUser(mockUser);
                localStorage.setItem('ats_user', JSON.stringify(mockUser));
                return { success: true, user: mockUser };
            };

            const logout = () => {
                setUser(null);
                localStorage.removeItem('ats_user');
            };

            const isAdmin = () => user?.roles?.includes('ROLE_ADMIN') || false;

            return (
                <AuthContext.Provider value={{ user, loading, login, signup, logout, isAdmin }}>
                    {children}
                </AuthContext.Provider>
            );
        };

        // ==================== CART PROVIDER ====================
        const CartProvider = ({ children }) => {
            const [cartItems, setCartItems] = React.useState([]);

            React.useEffect(() => {
                const savedCart = localStorage.getItem('ats_cart');
                if (savedCart) setCartItems(JSON.parse(savedCart));
            }, []);

            React.useEffect(() => {
                localStorage.setItem('ats_cart', JSON.stringify(cartItems));
            }, [cartItems]);

            const addToCart = (product, quantity = 1) => {
                setCartItems(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + quantity } : item);
                    }
                    return [...prev, { ...product, quantity }];
                });
            };

            const removeFromCart = (productId) => setCartItems(prev => prev.filter(item => item.id !== productId));
            
            const updateQuantity = (productId, quantity) => {
                if (quantity <= 0) {
                    removeFromCart(productId);
                    return;
                }
                setCartItems(prev => prev.map(item => item.id === productId ? { ...item, quantity } : item));
            };

            const clearCart = () => setCartItems([]);
            
            const getCartTotal = () => cartItems.reduce((total, item) => total + (item.price * item.quantity), 0);
            
            const getCartCount = () => cartItems.reduce((count, item) => count + item.quantity, 0);

            return (
                <CartContext.Provider value={{ cartItems, addToCart, removeFromCart, updateQuantity, clearCart, getCartTotal, getCartCount }}>
                    {children}
                </CartContext.Provider>
            );
        };

        // ==================== HOOKS ====================
        const useAuth = () => React.useContext(AuthContext);
        const useCart = () => React.useContext(CartContext);

        // ==================== COMPONENTS ====================
        const ProductCard = ({ product }) => {
            const getCategoryColor = (categoryName) => {
                const lower = (categoryName || '').toLowerCase();
                if (lower.includes('hoodie') || lower.includes('apparel')) return 'bg-blue-100 text-blue-800';
                if (lower.includes('shirt')) return 'bg-green-100 text-green-800';
                if (lower.includes('bottle') || lower.includes('cup')) return 'bg-purple-100 text-purple-800';
                return 'bg-gray-100 text-gray-800';
            };

            return (
                <div className="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300">
                    <div className="relative overflow-hidden group">
                        <img src={product.imageUrl} alt={product.name} className="w-full h-64 object-cover group-hover:scale-110 transition-transform duration-300" />
                        <span className={\`absolute top-3 left-3 px-3 py-1 rounded-full text-xs font-semibold \${getCategoryColor(product.category?.name)}\`}>
                            {product.category?.name || 'General'}
                        </span>
                    </div>
                    <div className="p-6">
                        <h3 className="text-xl font-bold text-gray-900 mb-2">{product.name}</h3>
                        <p className="text-gray-600 text-sm mb-4 line-clamp-2">{product.description || 'No description available'}</p>
                        <div className="flex items-center justify-between">
                            <span className="text-2xl font-bold text-[#C41E3A]">R {product.price.toFixed(2)}</span>
                            <a href={\`#/product/\${product.id}\`} className="btn btn-primary text-sm">View Details</a>
                        </div>
                    </div>
                </div>
            );
        };

        const Header = () => {
            const { getCartCount } = useCart();
            const { user, logout, isAdmin } = useAuth();
            const [showUserMenu, setShowUserMenu] = React.useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);
            const cartCount = getCartCount();

            const NavLink = ({ to, label, isActive, closeMenu }) => (
                <a href={to} onClick={closeMenu} className={\`block text-lg font-medium transition-colors \${window.location.hash === '#' + to ? 'text-[#C41E3A]' : 'text-gray-700 hover:text-[#C41E3A]'}\`}>
                    {label}
                </a>
            );

            return (
                <header className="bg-white shadow-md sticky top-0 z-50">
                    <div className="container mx-auto px-4">
                        <div className="flex items-center justify-between h-20">
                            <a href="#/" className="flex items-center">
                                <div className="h-12 w-12 bg-gradient-to-r from-[#C41E3A] to-[#CC5500] rounded-full flex items-center justify-center text-white font-bold text-xl">ATS</div>
                            </a>
                            <nav className="hidden md:flex items-center gap-6">
                                {isAdmin() ? (
                                    <>
                                        <NavLink to="/admin/products" label="Products" isActive={() => false} closeMenu={() => setMobileMenuOpen(false)} />
                                        <NavLink to="/admin/orders" label="Orders" isActive={() => false} closeMenu={() => setMobileMenuOpen(false)} />
                                        <NavLink to="/admin" label="Dashboard" isActive={() => false} closeMenu={() => setMobileMenuOpen(false)} />
                                    </>
                                ) : (
                                    <>
                                        <NavLink to="/" label="Home" isActive={() => false} closeMenu={() => setMobileMenuOpen(false)} />
                                        <NavLink to="/shop" label="Shop" isActive={() => false} closeMenu={() => setMobileMenuOpen(false)} />
                                        <a href="#/cart" className="relative inline-block">
                                            <i className="fa-solid fa-cart-shopping text-2xl text-gray-700 hover:text-[#C41E3A] transition-colors"></i>
                                            {cartCount > 0 && (
                                                <span className="absolute -top-2 -right-2 bg-[#C41E3A] text-white rounded-full min-w-[24px] h-6 flex items-center justify-center text-xs font-bold px-1.5 shadow-lg border-2 border-white">
                                                    {cartCount}
                                                </span>
                                            )}
                                        </a>
                                    </>
                                )}
                                {user ? (
                                    <div className="relative">
                                        <button onClick={() => setShowUserMenu(!showUserMenu)} className="flex items-center gap-2 text-gray-700 hover:text-[#C41E3A]">
                                            <div className="w-8 h-8 rounded-full bg-[#C41E3A] text-white flex items-center justify-center text-sm font-semibold">
                                                {getUserInitials(user)}
                                            </div>
                                            <span className="text-sm font-medium">{getUserDisplayName(user)}</span>
                                            <i className="fa-solid fa-chevron-down text-xs"></i>
                                        </button>
                                        {showUserMenu && (
                                            <>
                                                <div className="fixed inset-0 z-40" onClick={() => setShowUserMenu(false)} />
                                                <div className="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg z-50 border">
                                                    {!isAdmin() && (
                                                        <a href="#/orders" className="block px-4 py-2 text-sm hover:bg-gray-100" onClick={() => setShowUserMenu(false)}>
                                                            My Orders
                                                        </a>
                                                    )}
                                                    <button onClick={() => { logout(); setShowUserMenu(false); setMobileMenuOpen(false); window.location.hash = '#/'; }} 
                                                        className={\`w-full text-left px-4 py-2 text-sm hover:bg-gray-100 \${!isAdmin() ? 'border-t' : ''}\`}>
                                                        Logout
                                                    </button>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                ) : (
                                    <NavLink to="/login" label="Login" isActive={() => false} closeMenu={() => setMobileMenuOpen(false)} />
                                )}
                            </nav>
                            <button className="md:hidden text-2xl text-gray-700" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                                <i className={\`fa-solid \${mobileMenuOpen ? 'fa-xmark' : 'fa-bars'}\`}></i>
                            </button>
                        </div>
                    </div>
                    {mobileMenuOpen && (
                        <div className="md:hidden bg-white border-t shadow-lg">
                            <div className="px-6 py-4 space-y-4">
                                {user && (
                                    <div className="flex items-center gap-3 pb-4 border-b">
                                        <div className="w-10 h-10 rounded-full bg-[#C41E3A] text-white flex items-center justify-center text-sm font-semibold">
                                            {getUserInitials(user)}
                                        </div>
                                        <div>
                                            <p className="font-semibold text-gray-900">{getUserDisplayName(user)}</p>
                                            <p className="text-xs text-gray-500">{user.email}</p>
                                        </div>
                                    </div>
                                )}
                                {isAdmin() ? (
                                    <>
                                        <NavLink to="/admin/products" label="Products" isActive={() => false} closeMenu={() => setMobileMenuOpen(false)} />
                                        <NavLink to="/admin/orders" label="Orders" isActive={() => false} closeMenu={() => setMobileMenuOpen(false)} />
                                        <NavLink to="/admin" label="Dashboard" isActive={() => false} closeMenu={() => setMobileMenuOpen(false)} />
                                    </>
                                ) : (
                                    <>
                                        <NavLink to="/" label="Home" isActive={() => false} closeMenu={() => setMobileMenuOpen(false)} />
                                        <NavLink to="/shop" label="Shop" isActive={() => false} closeMenu={() => setMobileMenuOpen(false)} />
                                        <NavLink to="/cart" label={\`Cart (\${cartCount})\`} isActive={() => false} closeMenu={() => setMobileMenuOpen(false)} />
                                    </>
                                )}
                                {user ? (
                                    <>
                                        {!isAdmin() && <NavLink to="/orders" label="My Orders" isActive={() => false} closeMenu={() => setMobileMenuOpen(false)} />}
                                        <button onClick={() => { logout(); setMobileMenuOpen(false); window.location.hash = '#/'; }} className="block w-full text-left text-lg text-gray-700 hover:text-[#C41E3A] font-medium">
                                            Logout
                                        </button>
                                    </>
                                ) : (
                                    <NavLink to="/login" label="Login" isActive={() => false} closeMenu={() => setMobileMenuOpen(false)} />
                                )}
                            </div>
                        </div>
                    )}
                </header>
            );
        };

        const Footer = () => (
            <footer className="bg-gray-900 text-white py-12 mt-20">
                <div className="container mx-auto px-4">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                        <div className="flex flex-col items-start">
                            <div className="h-16 w-16 bg-gradient-to-r from-[#C41E3A] to-[#CC5500] rounded-full flex items-center justify-center text-white font-bold text-2xl mb-4">ATS</div>
                            <p className="font-bold text-lg mb-4">Developing Young People<br />from Cradle to Career</p>
                            <div className="text-sm text-gray-400">
                                <p>NPO: 021 - 892</p>
                                <p>PBO: 18/11/13/2470</p>
                                <p>NPC: 1998/15327/08</p>
                            </div>
                        </div>
                        <div>
                            <h4 className="font-bold text-lg mb-4">FOUNDATION</h4>
                            <p className="text-sm text-gray-300 mb-4">
                                Ground Floor, Eastwood Building<br />57 6th Road<br />Hyde Park, South Africa<br /><br />
                                <a href="tel:+27113255914" className="hover:underline block">+27 11 325 5914</a>
                                <a href="mailto:info@afrikatikkun.org" className="hover:underline block">info@afrikatikkun.org</a>
                            </p>
                            <div className="flex gap-4 text-gray-400 text-lg">
                                <a href="#" className="fab fa-facebook-f hover:text-white transition"></a>
                                <a href="#" className="fab fa-linkedin-in hover:text-white transition"></a>
                                <a href="#" className="fab fa-instagram hover:text-white transition"></a>
                                <a href="#" className="fab fa-x-twitter hover:text-white transition"></a>
                                <a href="#" className="fab fa-youtube hover:text-white transition"></a>
                            </div>
                        </div>
                        <div>
                            <h4 className="font-bold text-lg mb-4">SERVICES</h4>
                            <p className="text-sm text-gray-300 mb-4">
                                1 Bond Street, Kensington B,<br />Randburg, South Africa<br /><br />
                                <a href="tel:+27113256123" className="hover:underline block">+27 11 325 6123</a>
                                <a href="mailto:info@afrikatikkunservices.com" className="hover:underline block">info@afrikatikkunservices.com</a>
                            </p>
                        </div>
                        <div>
                            <h4 className="font-bold text-lg mb-4">NEWSLETTER</h4>
                            <p className="text-sm text-gray-300 mb-2">Subscribe to stay updated</p>
                            <form onSubmit={(e) => e.preventDefault()}>
                                <input type="email" placeholder="Email" required className="w-full px-4 py-2 rounded-lg mb-2 text-gray-900" />
                                <button className="btn bg-[#C41E3A] text-white hover:bg-[#A81830] w-full">Subscribe</button>
                            </form>
                        </div>
                    </div>
                    <div className="text-center text-sm text-gray-400 mt-12 pt-8 border-t border-gray-800">
                        <p>© 2026 Afrika Tikkun. All rights reserved.</p>
                    </div>
                </div>
            </footer>
        );

        const ATSChat = () => {
            const [isOpen, setIsOpen] = React.useState(false);
            const [isMinimized, setIsMinimized] = React.useState(false);
            const [messages, setMessages] = React.useState([
                {
                    id: 1,
                    sender: 'bot',
                    text: 'Hello! I\'m your Afrika Tikkun shopping assistant 🤖 Browse our exclusive merchandise: hoodies, t-shirts, bottles, cups, bags, and caps. Every purchase supports youth empowerment!',
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                }
            ]);
            const [input, setInput] = React.useState('');
            const [isTyping, setIsTyping] = React.useState(false);
            const messagesEndRef = React.useRef(null);

            React.useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages, isTyping]);

            const knowledgeBase = [
                { keywords: ['products', 'sell', 'merchandise', 'shop'], response: 'We sell exclusive Afrika Tikkun branded merchandise:\n\n👕 Hoodies\n👔 T-Shirts\n🍾 Water Bottles\n☕ Cups/Mugs\n🎒 Drawstring Bags\n🧢 Caps\n\n100% of proceeds go directly to youth empowerment programs!' },
                { keywords: ['hoodie', 'hoodies'], response: 'Our Afrika Tikkun hoodies are perfect for showing your support! Check out our shop to see available colors and sizes!' },
                { keywords: ['shirt', 't-shirt'], response: 'Our branded t-shirts are a great way to spread awareness about Afrika Tikkun\'s mission!' },
                { keywords: ['bottle', 'water'], response: 'Stay hydrated while supporting a great cause! Our branded water bottles are durable and eco-friendly!' },
                { keywords: ['order', 'buy', 'purchase'], response: 'Easy ordering process:\n\n1️⃣ Browse our merchandise\n2️⃣ Click "Add to Cart"\n3️⃣ Click the cart icon to review\n4️⃣ Proceed to checkout\n5️⃣ Complete payment securely with Stripe' },
                { keywords: ['shipping', 'delivery'], response: 'We offer FREE shipping on all orders! 🎉\n\n📦 Standard Delivery: 3-5 business days\n⚡ Express Delivery: 1-2 business days' },
                { keywords: ['mission', 'about', 'purpose'], response: '🌍 Afrika Tikkun\'s Mission: 100% of proceeds support programs that empower youth and transform communities across Africa! We\'ve impacted 15,000+ youth across 50+ communities.' },
                { keywords: ['payment', 'pay', 'card'], response: 'We accept all major credit and debit cards through our secure Stripe payment gateway. All transactions are encrypted and secure.' },
                { keywords: ['return', 'refund'], response: 'We offer a 30-day return policy! Refunds are processed within 5-7 business days after we receive the returned item.' },
                { keywords: ['hello', 'hi', 'hey'], response: 'Hi there! 👋 Welcome to Afrika Tikkun! How can I help you today?' },
                { keywords: ['thank', 'thanks'], response: 'You\'re very welcome! 😊 Thank you for supporting our mission!' }
            ];

            const getBotResponse = (text) => {
                const input = text.toLowerCase();
                for (let item of knowledgeBase) {
                    for (let keyword of item.keywords) {
                        if (input.includes(keyword)) return item.response;
                    }
                }
                return 'I can help with product info, orders, shipping, returns, and our mission. What would you like to know?';
            };

            const handleSendMessage = () => {
                if (!input.trim()) return;
                const userMessage = { id: Date.now(), sender: 'user', text: input, timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setIsTyping(true);
                setTimeout(() => {
                    const botMessage = { id: Date.now() + 1, sender: 'bot', text: getBotResponse(input), timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
                    setMessages(prev => [...prev, botMessage]);
                    setIsTyping(false);
                }, 1000);
            };

            return (
                <div className="fixed bottom-6 right-6 z-50">
                    {isOpen && (
                        <div className={\`mb-4 w-96 bg-white rounded-2xl shadow-2xl transition-all duration-300 \${isMinimized ? 'h-16' : 'h-[500px]'} flex flex-col\`}>
                            <div className="flex items-center justify-between bg-gradient-to-r from-[#C41E3A] to-[#CC5500] text-white px-4 py-3 rounded-t-2xl">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-white rounded-full flex items-center justify-center">
                                        <span className="text-[#C41E3A] font-bold text-xs">ATS</span>
                                    </div>
                                    <div>
                                        <h3 className="font-semibold text-sm">ATS Assistant</h3>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2">
                                    <button onClick={() => setIsMinimized(!isMinimized)} className="w-8 h-8 hover:bg-red-800 rounded-lg transition-colors">
                                        <i className={\`fa-solid \${isMinimized ? 'fa-chevron-up' : 'fa-chevron-down'}\`}></i>
                                    </button>
                                    <button onClick={() => setIsOpen(false)} className="w-8 h-8 hover:bg-red-800 rounded-lg transition-colors">
                                        <i className="fa-solid fa-times"></i>
                                    </button>
                                </div>
                            </div>
                            {!isMinimized && (
                                <>
                                    <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50">
                                        {messages.map(msg => (
                                            <div key={msg.id} className={\`flex \${msg.sender === 'user' ? 'justify-end' : 'justify-start'}\`}>
                                                <div className={\`max-w-[85%] rounded-2xl px-4 py-3 \${msg.sender === 'user' ? 'bg-[#C41E3A] text-white' : 'bg-white text-gray-800 shadow-sm'}\`}>
                                                    <p className="text-sm whitespace-pre-line">{msg.text}</p>
                                                    <p className={\`text-xs mt-1 \${msg.sender === 'user' ? 'text-red-100' : 'text-gray-500'}\`}>{msg.timestamp}</p>
                                                </div>
                                            </div>
                                        ))}
                                        {isTyping && (
                                            <div className="flex justify-start">
                                                <div className="bg-white rounded-2xl px-4 py-3 shadow-sm">
                                                    <div className="flex gap-1">
                                                        <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                                                        <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0.2s' }}></div>
                                                        <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0.4s' }}></div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                        <div ref={messagesEndRef} />
                                    </div>
                                    <div className="p-4 bg-white border-t">
                                        <div className="flex gap-2">
                                            <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()}
                                                placeholder="Ask about our products..." className="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#C41E3A]" />
                                            <button onClick={handleSendMessage} disabled={!input.trim()} className="px-4 py-2 bg-[#C41E3A] text-white rounded-lg hover:bg-[#A81830] disabled:opacity-50">
                                                <i className="fa-solid fa-paper-plane"></i>
                                            </button>
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    )}
                    <button onClick={() => { setIsOpen(!isOpen); setIsMinimized(false); }} 
                        className="w-16 h-16 bg-gradient-to-r from-[#C41E3A] to-[#CC5500] text-white rounded-full shadow-lg hover:shadow-xl hover:scale-110 transition-all flex items-center justify-center">
                        <i className={\`fa-solid \${isOpen ? 'fa-times' : 'fa-comment'} text-2xl\`}></i>
                    </button>
                </div>
            );
        };

        // ==================== PAGES ====================
        const Home = () => (
            <div className="min-h-screen">
                <section className="bg-gradient-to-r from-[#C41E3A] to-[#CC5500] text-white py-20">
                    <div className="container mx-auto px-4 text-center">
                        <h1 className="text-5xl font-bold mb-6">Support the Mission</h1>
                        <p className="text-xl mb-8 max-w-3xl mx-auto">100% of proceeds go directly to empowering youth across Africa</p>
                        <a href="#/shop" className="btn bg-white text-[#C41E3A] hover:bg-gray-100 px-8 py-4 text-lg">Shop Now</a>
                    </div>
                </section>
                <section className="py-16 bg-gray-50">
                    <div className="container mx-auto px-4">
                        <h2 className="text-3xl font-bold text-center mb-12">Our Impact</h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div className="text-center"><div className="text-4xl font-bold text-[#C41E3A] mb-2">15,000+</div><p>Youth Empowered</p></div>
                            <div className="text-center"><div className="text-4xl font-bold text-[#C41E3A] mb-2">50+</div><p>Communities Served</p></div>
                            <div className="text-center"><div className="text-4xl font-bold text-[#C41E3A] mb-2">85%</div><p>Success Rate</p></div>
                        </div>
                    </div>
                </section>
                <section className="py-16">
                    <div className="container mx-auto px-4">
                        <h2 className="text-3xl font-bold text-center mb-12">Featured Products</h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {mockProducts.slice(0, 3).map(p => <ProductCard key={p.id} product={p} />)}
                        </div>
                    </div>
                </section>
            </div>
        );

        const Shop = () => (
            <div className="min-h-screen bg-gray-50 py-12">
                <div className="container mx-auto px-4">
                    <h1 className="text-4xl font-bold text-center mb-4">Our Merchandise</h1>
                    <p className="text-center text-gray-600 mb-12">Every purchase supports youth empowerment</p>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {mockProducts.map(p => <ProductCard key={p.id} product={p} />)}
                    </div>
                </div>
            </div>
        );

        const ProductDetail = () => {
            const id = window.location.hash.split('/')[2];
            const product = mockProducts.find(p => p.id === parseInt(id));
            const { addToCart } = useCart();
            const [quantity, setQuantity] = React.useState(1);
            const navigate = () => window.location.hash = '#/cart';

            if (!product) return <div className="min-h-screen flex items-center justify-center">Product not found</div>;

            return (
                <div className="min-h-screen bg-gray-50 py-12">
                    <div className="container mx-auto px-4">
                        <div className="bg-white rounded-xl shadow-lg p-8">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <img src={product.imageUrl} alt={product.name} className="w-full h-96 object-cover rounded-lg" />
                                <div>
                                    <h1 className="text-3xl font-bold mb-4">{product.name}</h1>
                                    <p className="text-gray-600 mb-6">{product.description}</p>
                                    <div className="text-3xl font-bold text-[#C41E3A] mb-6">R {product.price.toFixed(2)}</div>
                                    <div className="mb-6">
                                        <label className="block font-semibold mb-2">Quantity</label>
                                        <div className="flex items-center gap-3">
                                            <button onClick={() => setQuantity(Math.max(1, quantity-1))} className="w-10 h-10 border rounded-md">-</button>
                                            <span className="text-xl w-12 text-center">{quantity}</span>
                                            <button onClick={() => setQuantity(quantity+1)} className="w-10 h-10 border rounded-md">+</button>
                                        </div>
                                    </div>
                                    <button onClick={() => { addToCart(product, quantity); navigate(); }} className="w-full btn btn-primary py-4 text-lg">
                                        Add to Cart
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Cart = () => {
            const { cartItems, removeFromCart, updateQuantity, getCartTotal } = useCart();
            const { user } = useAuth();

            if (cartItems.length === 0) {
                return (
                    <div className="min-h-screen bg-gray-50 py-12">
                        <div className="container mx-auto px-4 text-center">
                            <div className="bg-white p-12 rounded-lg">
                                <i className="fa-solid fa-cart-shopping text-6xl text-gray-300 mb-4"></i>
                                <h2 className="text-2xl font-bold mb-4">Your Cart is Empty</h2>
                                <a href="#/shop" className="btn btn-primary">Start Shopping</a>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 py-12">
                    <div className="container mx-auto px-4">
                        <h1 className="text-3xl font-bold mb-8">Shopping Cart</h1>
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2">
                                {cartItems.map((item, i) => (
                                    <div key={item.id} className={\`bg-white p-6 \${i !== cartItems.length-1 ? 'border-b' : ''}\`}>
                                        <div className="flex gap-6">
                                            <img src={item.imageUrl} alt={item.name} className="w-24 h-24 object-cover rounded" />
                                            <div className="flex-1">
                                                <h3 className="font-semibold">{item.name}</h3>
                                                <p className="text-[#C41E3A] font-bold mt-2">R {item.price.toFixed(2)}</p>
                                                <div className="flex items-center gap-4 mt-4">
                                                    <div className="flex items-center border rounded">
                                                        <button onClick={() => updateQuantity(item.id, item.quantity-1)} className="px-3 py-1">-</button>
                                                        <span className="px-4 py-1 border-x">{item.quantity}</span>
                                                        <button onClick={() => updateQuantity(item.id, item.quantity+1)} className="px-3 py-1">+</button>
                                                    </div>
                                                    <button onClick={() => removeFromCart(item.id)} className="text-red-600 text-sm">Remove</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="lg:col-span-1">
                                <div className="bg-white p-6 rounded-lg shadow sticky top-24">
                                    <h2 className="text-xl font-bold mb-4">Order Summary</h2>
                                    <div className="flex justify-between mb-2"><span>Subtotal</span><span>R {getCartTotal().toFixed(2)}</span></div>
                                    <div className="flex justify-between mb-4"><span>Shipping</span><span className="text-green-600">Free</span></div>
                                    <div className="border-t pt-4 mb-4"><div className="flex justify-between font-bold"><span>Total</span><span className="text-[#C41E3A]">R {getCartTotal().toFixed(2)}</span></div></div>
                                    <a href={user ? "#/checkout" : "#/login"} className="w-full btn btn-primary py-4 text-lg mb-3 text-center block">Checkout</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Login = () => {
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [error, setError] = React.useState('');
            const { login } = useAuth();

            const handleSubmit = async (e) => {
                e.preventDefault();
                const result = await login(email, password);
                if (result.success) window.location.hash = '#/';
                else setError(result.error);
            };

            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center py-12">
                    <div className="max-w-md w-full bg-white p-8 rounded-xl shadow-lg">
                        <h2 className="text-2xl font-bold text-center mb-8">Login</h2>
                        {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg mb-4">{error}</div>}
                        <form onSubmit={handleSubmit}>
                            <input type="email" placeholder="Email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full p-3 border rounded-lg mb-4" required />
                            <input type="password" placeholder="Password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full p-3 border rounded-lg mb-4" required />
                            <p className="text-sm text-gray-500 mb-4">Demo: admin@afrikatikkun.org / admin123</p>
                            <button type="submit" className="w-full btn btn-primary py-3">Sign In</button>
                        </form>
                        <p className="text-center mt-4">Don't have an account? <a href="#/signup" className="text-[#C41E3A]">Sign up</a></p>
                    </div>
                </div>
            );
        };

        const Signup = () => {
            const [formData, setFormData] = React.useState({ firstName: '', lastName: '', email: '', password: '' });
            const { signup } = useAuth();

            const handleSubmit = async (e) => {
                e.preventDefault();
                await signup(formData);
                window.location.hash = '#/';
            };

            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center py-12">
                    <div className="max-w-md w-full bg-white p-8 rounded-xl shadow-lg">
                        <h2 className="text-2xl font-bold text-center mb-8">Sign Up</h2>
                        <form onSubmit={handleSubmit}>
                            <input type="text" placeholder="First Name" value={formData.firstName} onChange={(e) => setFormData({...formData, firstName: e.target.value})} className="w-full p-3 border rounded-lg mb-4" required />
                            <input type="text" placeholder="Last Name" value={formData.lastName} onChange={(e) => setFormData({...formData, lastName: e.target.value})} className="w-full p-3 border rounded-lg mb-4" required />
                            <input type="email" placeholder="Email" value={formData.email} onChange={(e) => setFormData({...formData, email: e.target.value})} className="w-full p-3 border rounded-lg mb-4" required />
                            <input type="password" placeholder="Password" value={formData.password} onChange={(e) => setFormData({...formData, password: e.target.value})} className="w-full p-3 border rounded-lg mb-4" required />
                            <button type="submit" className="w-full btn btn-primary py-3">Create Account</button>
                        </form>
                        <p className="text-center mt-4">Already have an account? <a href="#/login" className="text-[#C41E3A]">Login</a></p>
                    </div>
                </div>
            );
        };

        const Checkout = () => {
            const { cartItems, getCartTotal } = useCart();
            return (
                <div className="min-h-screen bg-gray-50 py-12">
                    <div className="container mx-auto px-4 max-w-2xl">
                        <div className="bg-white p-8 rounded-xl shadow-lg">
                            <h1 className="text-2xl font-bold mb-6">Checkout</h1>
                            <div className="mb-6">
                                <h3 className="font-semibold mb-2">Order Summary</h3>
                                {cartItems.map(item => (
                                    <div key={item.id} className="flex justify-between text-sm mb-2">
                                        <span>{item.name} x{item.quantity}</span>
                                        <span>R {(item.price * item.quantity).toFixed(2)}</span>
                                    </div>
                                ))}
                                <div className="border-t pt-2 mt-2 font-bold flex justify-between">
                                    <span>Total:</span>
                                    <span className="text-[#C41E3A]">R {getCartTotal().toFixed(2)}</span>
                                </div>
                            </div>
                            <div className="p-4 bg-green-50 text-green-700 rounded-lg mb-4">
                                <i className="fa-solid fa-check-circle mr-2"></i>
                                Demo Mode - Payment would be processed here
                            </div>
                            <a href="#/checkout-success" className="w-full btn btn-primary py-3 text-center block">Complete Order</a>
                        </div>
                    </div>
                </div>
            );
        };

        const CheckoutSuccess = () => (
            <div className="min-h-screen bg-gray-50 flex items-center justify-center py-12">
                <div className="bg-white p-8 rounded-xl shadow-lg text-center max-w-md">
                    <i className="fa-solid fa-circle-check text-6xl text-green-500 mb-4"></i>
                    <h1 className="text-2xl font-bold mb-4">Order Successful!</h1>
                    <p className="text-gray-600 mb-6">Thank you for supporting Afrika Tikkun. Your order has been confirmed.</p>
                    <a href="#/shop" className="btn btn-primary">Continue Shopping</a>
                </div>
            </div>
        );

        // ==================== APP ====================
        const App = () => {
            const [currentPath, setCurrentPath] = React.useState(window.location.hash || '#/');

            React.useEffect(() => {
                const handleHashChange = () => setCurrentPath(window.location.hash || '#/');
                window.addEventListener('hashchange', handleHashChange);
                if (!window.location.hash) window.location.hash = '#/';
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const getContent = () => {
                const path = currentPath.split('?')[0];
                if (path === '#/') return <Home />;
                if (path === '#/shop') return <Shop />;
                if (path.startsWith('#/product/')) return <ProductDetail />;
                if (path === '#/cart') return <Cart />;
                if (path === '#/checkout') return <Checkout />;
                if (path === '#/checkout-success') return <CheckoutSuccess />;
                if (path === '#/login') return <Login />;
                if (path === '#/signup') return <Signup />;
                return <Home />;
            };

            return (
                <AuthProvider>
                    <CartProvider>
                        <div className="flex flex-col min-h-screen">
                            <Header />
                            <main className="flex-grow">
                                {getContent()}
                            </main>
                            <Footer />
                            <ATSChat />
                        </div>
                    </CartProvider>
                </AuthProvider>
            );
        };

        // ==================== RENDER ====================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
