<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }

        /* Premium glass effect */
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }

        .glass-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -10px rgba(196, 30, 58, 0.15);
            border-color: rgba(196, 30, 58, 0.1);
        }

        /* Professional gradients */
        .gradient-primary {
            background: linear-gradient(135deg, #C41E3A 0%, #9e182f 100%);
        }

        .gradient-light {
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f0 100%);
        }

        /* Smooth animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out;
        }

        /* Premium scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #C41E3A;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #9e182f;
        }

        /* Category chips */
        .category-chip {
            background: white;
            border: 1px solid #e2e8f0;
            color: #475569;
            transition: all 0.2s;
        }

        .category-chip:hover {
            background: #C41E3A;
            color: white;
            border-color: #C41E3A;
            transform: translateY(-1px);
        }

        .category-chip.active {
            background: #C41E3A;
            color: white;
            border-color: #C41E3A;
        }

        /* Product image container */
        .product-image {
            position: relative;
            overflow: hidden;
            border-radius: 16px 16px 0 0;
        }

        .product-image img {
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .product-image:hover img {
            transform: scale(1.08);
        }

        /* Quick view overlay */
        .quick-view {
            position: absolute;
            bottom: -50px;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            padding: 12px;
            transition: bottom 0.3s ease;
            border-top: 1px solid rgba(196, 30, 58, 0.1);
        }

        .product-image:hover .quick-view {
            bottom: 0;
        }

        /* Button styles */
        .btn-primary {
            background: #C41E3A;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: #9e182f;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -8px rgba(196, 30, 58, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #C41E3A;
            color: #C41E3A;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            background: #C41E3A;
            color: white;
            transform: translateY(-2px);
        }

        /* Cart badge */
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #C41E3A;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Price tag */
        .price-tag {
            font-size: 1.5rem;
            font-weight: 700;
            color: #C41E3A;
        }

        /* Loading spinner */
        .spinner {
            border: 3px solid rgba(196, 30, 58, 0.1);
            border-top-color: #C41E3A;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Product detail page */
        .detail-image {
            border-radius: 24px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
        }

        .quantity-selector {
            display: inline-flex;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
        }

        .quantity-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .quantity-btn:hover {
            background: #f8fafc;
        }

        .quantity-input {
            width: 60px;
            text-align: center;
            border: none;
            border-left: 1px solid #e2e8f0;
            border-right: 1px solid #e2e8f0;
            font-weight: 600;
        }
    </style>
</head>

                    details: ['Durable polyester', 'Shoe compartment', 'Adjustable strap', 'Multiple pockets', 'Water-resistant'],

                },
                {

                    category: 'Caps', 
                    image: 'https://images.unsplash.com/photo-1556909190-eccf4a8bf97a?w=800', 
                    description: 'Performance cap with moisture-wicking sweatband and laser-cut ventilation.',
                    details: ['Performance fabric', 'Moisture-wicking', 'Laser ventilation', 'UV protection', 'Adjustable'],
                    stock: 40,
                    featured: false,
                    rating: 4.6
                }
            ];

            const categories = ['All', 'Hoodies', 'T-Shirts', 'Bottles', 'Cups', 'Bags', 'Caps'];

            // ==================== CONTEXT ====================
            const AuthContext = React.createContext(null);
            const CartContext = React.createContext(null);

            // ==================== AUTH PROVIDER ====================
            const AuthProvider = ({ children }) => {
                const [user, setUser] = React.useState(() => {
                    try {
                        return JSON.parse(localStorage.getItem('user')) || null;
                    } catch {
                        return null;
                    }
                });

                const login = async (email, password) => {
                    if (email === 'nomathemba@gmail.com' && password === 'Thembi') {
                        const userData = { 
                            id: 1, 
                            email: 'nomathemba@gmail.com',
                            firstName: 'Nomathemba',
                            lastName: 'Thembi',
                            roles: ['ROLE_ADMIN'],
                            lastLogin: new Date().toISOString()
                        };
                        setUser(userData);
                        localStorage.setItem('user', JSON.stringify(userData));
                        return { success: true, user: userData };
                    }
                    
                    if (email && password) {
                        const userData = { 
                            id: 2, 
                            email,
                            firstName: email.split('@')[0],
                            lastName: 'User',
                            roles: ['ROLE_USER']
                        };
                        setUser(userData);
                        localStorage.setItem('user', JSON.stringify(userData));
                        return { success: true, user: userData };
                    }
                    
                    return { success: false, error: 'Invalid credentials' };
                };

                const logout = () => {
                    setUser(null);
                    localStorage.removeItem('user');
                };

                const isAdmin = () => user?.roles?.includes('ROLE_ADMIN') || false;

                return React.createElement(
                    AuthContext.Provider,
                    { value: { user, login, logout, isAdmin } },
                    children
                );
            };

            // ==================== CART PROVIDER ====================
            const CartProvider = ({ children }) => {
                const [items, setItems] = React.useState(() => {
                    try {
                        return JSON.parse(localStorage.getItem('cart')) || [];
                    } catch {
                        return [];
                    }
                });

                React.useEffect(() => {
                    localStorage.setItem('cart', JSON.stringify(items));
                }, [items]);

                const addToCart = (product, quantity = 1) => {
                    setItems(prev => {
                        const existing = prev.find(item => item.id === product.id);
                        if (existing) {
                            return prev.map(item => 
                                item.id === product.id 
                                    ? { ...item, quantity: item.quantity + quantity }
                                    : item
                            );
                        }
                        return [...prev, { ...product, quantity }];
                    });
                };

                const removeFromCart = (id) => {
                    setItems(prev => prev.filter(item => item.id !== id));
                };

                const updateQuantity = (id, quantity) => {
                    if (quantity <= 0) {
                        removeFromCart(id);
                        return;
                    }
                    setItems(prev => prev.map(item => 
                        item.id === id ? { ...item, quantity } : item
                    ));
                };

                const getTotal = () => items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const getCount = () => items.reduce((sum, item) => sum + item.quantity, 0);

                return React.createElement(
                    CartContext.Provider,
                    { value: { items, addToCart, removeFromCart, updateQuantity, getTotal, getCount } },
                    children
                );
            };

            // ==================== HOOKS ====================
            const useAuth = () => React.useContext(AuthContext);
            const useCart = () => React.useContext(CartContext);

            // ==================== LOGO ====================
            const Logo = () => React.createElement(
                'div',
                { className: 'flex items-center gap-2' },
                React.createElement('div', { className: 'w-8 h-8 gradient-primary rounded-lg flex items-center justify-center text-white font-bold text-sm' }, 'ATS'),
                React.createElement(
                    'div',
                    { className: 'flex flex-col' },
                    React.createElement('span', { className: 'font-bold text-sm' }, 'Afrika Tikkun'),
                    React.createElement('span', { className: 'text-xs text-gray-500' }, 'Developing Youth')
                )
            );

            // ==================== CHATBOT ====================
            const ChatBot = () => {
                const [isOpen, setIsOpen] = React.useState(false);
                const [messages, setMessages] = React.useState([
                    { id: 1, sender: 'bot', text: 'Welcome to Afrika Tikkun. How can I help you today?', time: new Date().toLocaleTimeString() }
                ]);
                const [input, setInput] = React.useState('');
                const messagesEndRef = React.useRef(null);

                React.useEffect(() => {
                    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                }, [messages]);

                const handleSend = () => {
                    if (!input.trim()) return;
                    
                    const userMsg = { id: Date.now(), sender: 'user', text: input, time: new Date().toLocaleTimeString() };
                    setMessages(prev => [...prev, userMsg]);
                    
                    const lower = input.toLowerCase();
                    let response = '';
                    
                    if (lower.includes('hoodie')) response = 'Our hoodies range from R450-R480. The Heritage and Summit are our bestsellers.';
                    else if (lower.includes('shirt') || lower.includes('tee')) response = 'T-shirts start at R250. The Origin is our most popular.';
                    else if (lower.includes('bottle')) response = 'Insulated bottles from R180-R220. All stainless steel.';
                    else if (lower.includes('shipping')) response = 'Free shipping on all orders. Delivery within 3-5 business days.';
                    else if (lower.includes('return')) response = '30-day return policy with full refund guarantee.';
                    else if (lower.includes('mission')) response = '100% of proceeds fund youth development programs across South Africa.';
                    else if (lower.includes('hello') || lower.includes('hi')) response = 'Hello! How may I assist you today?';
                    else if (lower.includes('thank')) response = "You're welcome! Let me know if you need anything else.";
                    else response = 'I can help with product information, pricing, shipping, and returns. What would you like to know?';
                    
                    setTimeout(() => {
                        setMessages(prev => [...prev, { id: Date.now(), sender: 'bot', text: response, time: new Date().toLocaleTimeString() }]);
                    }, 500);
                    
                    setInput('');
                };

                return React.createElement(
                    'div',
                    { className: 'fixed bottom-6 right-6 z-50' },
                    isOpen && React.createElement(
                        'div',
                        { className: 'w-80 bg-white rounded-2xl shadow-2xl border border-gray-100 mb-4 overflow-hidden' },
                        React.createElement(
                            'div',
                            { className: 'gradient-primary p-4 text-white flex justify-between items-center' },
                            React.createElement('span', { className: 'font-semibold' }, 'ATS Support'),
                            React.createElement('button', { onClick: () => setIsOpen(false), className: 'text-white/80 hover:text-white' }, '✕')
                        ),
                        React.createElement(
                            'div',
                            { className: 'h-96 overflow-y-auto p-4 space-y-3 bg-gray-50' },
                            messages.map(msg => React.createElement(
                                'div',
                                { key: msg.id, className: `flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}` },
                                React.createElement(
                                    'div',
                                    { className: `max-w-[80%] p-3 rounded-lg ${msg.sender === 'user' ? 'bg-[#C41E3A] text-white' : 'bg-white border border-gray-200'}` },
                                    React.createElement('p', { className: 'text-sm' }, msg.text),
                                    React.createElement('span', { className: 'text-[10px] opacity-70 mt-1 block' }, msg.time)
                                )
                            )),
                            React.createElement('div', { ref: messagesEndRef })
                        ),
                        React.createElement(
                            'div',
                            { className: 'p-3 border-t' },
                            React.createElement(
                                'div',
                                { className: 'flex gap-2' },
                                React.createElement('input', {
                                    type: 'text',
                                    value: input,
                                    onChange: e => setInput(e.target.value),
                                    onKeyPress: e => e.key === 'Enter' && handleSend(),
                                    placeholder: 'Type your message...',
                                    className: 'flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#C41E3A]'
                                }),
                                React.createElement('button', {
                                    onClick: handleSend,
                                    className: 'bg-[#C41E3A] text-white px-3 rounded-lg hover:bg-[#9e182f] transition'
                                }, React.createElement('i', { className: 'fa-solid fa-paper-plane' }))
                            )
                        )
                    ),
                    React.createElement(
                        'button',
                        {
                            onClick: () => setIsOpen(!isOpen),
                            className: 'w-14 h-14 gradient-primary rounded-full flex items-center justify-center text-white shadow-lg hover:shadow-xl transition-all hover:scale-110'
                        },
                        React.createElement('i', { className: `fa-solid ${isOpen ? 'fa-times' : 'fa-comment'} text-xl` })
                    )
                );
            };

            // ==================== PRODUCT CARD ====================
            const ProductCard = ({ product }) => {
                const { addToCart } = useCart();
                
                return React.createElement(
                    'div',
                    { className: 'glass-card group' },
                    React.createElement(
                        'a',
                        { href: `#/product/${product.id}`, className: 'block' },
                        React.createElement(
                            'div',
                            { className: 'product-image relative' },
                            React.createElement('img', { 
                                src: product.image, 
                                alt: product.name, 
                                className: 'w-full h-64 object-cover'
                            }),
                            product.featured && React.createElement(
                                'span',
                                { className: 'absolute top-4 left-4 bg-[#C41E3A] text-white text-xs px-3 py-1 rounded-full' },
                                'Featured'
                            ),
                            React.createElement(
                                'div',
                                { className: 'quick-view flex gap-2' },
                                React.createElement(
                                    'button',
                                    {
                                        onClick: (e) => {
                                            e.preventDefault();
                                            addToCart(product, 1);
                                        },
                                        className: 'flex-1 bg-[#C41E3A] text-white text-sm py-2 rounded-lg hover:bg-[#9e182f] transition'
                                    },
                                    React.createElement('i', { className: 'fa-solid fa-cart-plus mr-2' }),
                                    'Quick Add'
                                ),
                                React.createElement(
                                    'a',
                                    { href: `#/product/${product.id}`, className: 'bg-white border border-gray-200 text-gray-700 text-sm py-2 px-3 rounded-lg hover:bg-gray-50 transition' },

                            )

                    ),
                    React.createElement(
                        'div',
                        { className: 'p-5' },
                        React.createElement(
                            'a',
                            { href: `#/product/${product.id}`, className: 'block' },
                            React.createElement(
                                'div',
                                { className: 'flex justify-between items-start mb-2' },
                                React.createElement('h3', { className: 'font-semibold hover:text-[#C41E3A] transition' }, product.name),
                                React.createElement('span', { className: 'text-xs bg-gray-100 px-2 py-1 rounded-full' }, product.category)
                            ),
                            React.createElement('p', { className: 'text-sm text-gray-500 mb-4 line-clamp-2' }, product.description),
                            React.createElement('div', { className: 'flex items-center justify-between' },
                                React.createElement('span', { className: 'price-tag' }, `R ${product.price}`),
                                React.createElement(
                                    'div',
                                    { className: 'flex items-center gap-1 text-sm text-gray-500' },
                                    React.createElement('i', { className: 'fa-solid fa-star text-yellow-400' }),
                                    React.createElement('span', null, product.rating)
                                )
                            )
                        )
                    )
                );
            };

            // ==================== PRODUCT DETAIL ====================
            const ProductDetail = () => {
                const [quantity, setQuantity] = React.useState(1);
                const [loading, setLoading] = React.useState(true);
                const [product, setProduct] = React.useState(null);
                const { addToCart } = useCart();
                
                const id = parseInt(window.location.hash.split('/')[2]);
                
                React.useEffect(() => {
                    setLoading(true);
                    setTimeout(() => {

                            ),
                            React.createElement(
                                'div',
                                { className: 'glass-card p-6' },
                                React.createElement('i', { className: 'fa-solid fa-users text-2xl text-[#C41E3A] mb-3' }),
                                React.createElement('h3', { className: 'font-semibold mb-2' }, 'Orders'),
                                React.createElement('p', { className: 'text-3xl font-bold' }, '247'),
                                React.createElement('p', { className: 'text-sm text-gray-500 mt-2' }, 'This month')
                            ),
                            React.createElement(
                                'div',
                                { className: 'glass-card p-6' },
                                React.createElement('i', { className: 'fa-solid fa-chart-line text-2xl text-[#C41E3A] mb-3' }),
                                React.createElement('h3', { className: 'font-semibold mb-2' }, 'Revenue'),
                                React.createElement('p', { className: 'text-3xl font-bold' }, 'R 82.5k'),
                                React.createElement('p', { className: 'text-sm text-gray-500 mt-2' }, '+18% vs last month')
                            )
                        )
                    )
                );
            };

            // ==================== MAIN APP ====================
            const App = () => {
                const [currentPath, setCurrentPath] = React.useState(window.location.hash || '#/');

                React.useEffect(() => {
                    const handleHashChange = () => setCurrentPath(window.location.hash || '#/');
                    window.addEventListener('hashchange', handleHashChange);
                    if (!window.location.hash) window.location.hash = '#/';
                    return () => window.removeEventListener('hashchange', handleHashChange);
                }, []);

                const renderPage = () => {
                    const path = currentPath.split('?')[0];
                    
                    if (path.startsWith('#/product/')) return React.createElement(ProductDetail);
                    if (path === '#/admin') return React.createElement(AdminDashboard);
                    if (path === '#/shop') return React.createElement(Shop);
                    if (path === '#/cart') return React.createElement(Cart);
                    if (path === '#/checkout') return React.createElement(Checkout);
                    if (path === '#/success') return React.createElement(Success);
                    if (path === '#/login') return React.createElement(Login);
                    
                    return React.createElement(Home);
                };

                return React.createElement(
                    AuthProvider,
                    null,
                    React.createElement(
                        CartProvider,
                        null,
                        React.createElement(
                            'div',
                            { className: 'min-h-screen bg-gray-50' },
                            React.createElement(Header, null),
                            React.createElement('main', null, renderPage()),
                            React.createElement(ChatBot, null)
                        )
                    )
                );
            };

            // ==================== RENDER ====================
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(App));
        })();
    </script>
</body>
</html>
